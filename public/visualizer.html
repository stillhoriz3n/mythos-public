<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORIZ3N — Signal Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=Fraunces:ital,opsz,wght@1,9..144,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stage-center:#1f1a2a;--stage-mid:#14121c;--stage-deep:#08070d;--stage-void:#020204;
    --signal-machine:#4ec9d4;--signal-synth:#e8b858;
    --core-white:#ffffff;--core-halo:#fff2c8;
    --ink-bright:#e8e3d4;--ink-soft:#b5b0a3;--ink-dim:#8a8574;--ink-faint:#4a4740;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--stage-void);overflow:hidden;font-family:'JetBrains Mono',monospace;color:var(--ink-bright);-webkit-font-smoothing:antialiased}
  canvas#viz{position:fixed;inset:0;width:100%;height:100%;z-index:1}
  .ground{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 55%,var(--stage-center) 0%,var(--stage-mid) 25%,var(--stage-deep) 55%,var(--stage-void) 100%)}
  .ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:28px 36px}
  .ui-top{display:flex;justify-content:space-between;align-items:flex-start}
  .ui-bottom{display:flex;justify-content:space-between;align-items:flex-end}
  .title-block h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(36px,6vw,72px);line-height:1.0;letter-spacing:-.02em;color:var(--signal-synth);pointer-events:auto}
  .title-block h1 .machine{color:var(--signal-machine)}
  .title-block h1 .amp{font-family:'Fraunces',serif;font-variation-settings:"opsz" 144;font-weight:300;font-style:italic;font-size:1.3em;color:var(--signal-synth)}
  .credit{text-align:right}
  .credit .primary{font-size:16px;font-weight:600;letter-spacing:.18em;color:var(--signal-synth)}
  .credit .secondary{font-size:10px;letter-spacing:.12em;color:var(--ink-dim);margin-top:4px}
  .track-info{pointer-events:auto}
  .track-info .now-playing{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--signal-synth);margin-bottom:8px;opacity:.7}
  .track-info .track-name{font-family:'Archivo',sans-serif;font-size:22px;font-weight:700;color:var(--ink-bright);letter-spacing:.01em}
  .track-info .album-name{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px;color:var(--ink-dim);margin-top:4px}
  .controls{pointer-events:auto;display:flex;align-items:center;gap:12px;margin-top:12px}
  .ctrl-btn{background:none;border:none;color:var(--ink-dim);cursor:pointer;padding:4px;display:flex;transition:color .15s}
  .ctrl-btn:hover{color:var(--ink-bright)}
  .ctrl-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .ctrl-btn.pp{width:36px;height:36px;border-radius:50%;background:var(--signal-synth);color:var(--stage-void);display:flex;align-items:center;justify-content:center}
  .ctrl-btn.pp:hover{background:#f5c970}
  .ctrl-btn.pp svg{width:14px;height:14px;fill:currentColor;stroke:none}
  .start-prompt{position:fixed;inset:0;z-index:100;background:rgba(2,2,4,.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;cursor:pointer}
  .start-prompt .label{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--signal-synth)}
  .start-prompt .play-circle{width:72px;height:72px;border-radius:50%;border:2px solid var(--signal-synth);display:flex;align-items:center;justify-content:center;transition:all .2s}
  .start-prompt:hover .play-circle{background:var(--signal-synth);box-shadow:0 0 40px rgba(232,184,88,.4)}
  .start-prompt .play-circle svg{width:24px;height:24px;fill:var(--signal-synth)}
  .start-prompt:hover .play-circle svg{fill:var(--stage-void)}
  .start-prompt.hidden{display:none}
  .emblem{opacity:.6}
  @media(max-width:600px){.ui{padding:16px 20px}.title-block h1{font-size:32px}.track-info .track-name{font-size:16px}}
</style>
</head>
<body>
<div class="ground"></div>
<canvas id="viz"></canvas>

<div class="ui">
  <div class="ui-top">
    <svg class="emblem" viewBox="0 0 70 60" width="32" height="28" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#e8b858" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.4" opacity=".9"/>
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".9" opacity=".8" fill="#e8b858" fill-opacity=".1"/>
        <circle cx="35" cy="30" r="1.8" fill="#ffe6a0" opacity=".95"/>
      </g>
    </svg>
    <div class="credit">
      <div class="primary">HORIZ3N</div>
      <div class="secondary">Prime Radiant &middot; 2026</div>
    </div>
  </div>
  <div class="ui-bottom">
    <div class="track-info">
      <div class="now-playing">&#10022; now playing</div>
      <div class="track-name" id="viz-track">Fender Bender</div>
      <div class="album-name" id="viz-album">Robots &amp; Remixes</div>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevTrack()" title="prev"><svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg></button>
        <button class="ctrl-btn pp" id="pp-btn" onclick="togglePause()" title="pause"><svg viewBox="0 0 24 24" id="pp-icon"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
        <button class="ctrl-btn" onclick="nextTrack()" title="next"><svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg></button>
      </div>
    </div>
    <div class="title-block">
      <h1><span class="machine">ROBOTS</span><br><span class="amp">&amp;</span> REMIXES</h1>
    </div>
  </div>
</div>

<div class="start-prompt" id="start" onclick="startViz()">
  <div class="play-circle"><svg viewBox="0 0 24 24"><polygon points="7,3 21,12 7,21"/></svg></div>
  <div class="label">click to play</div>
</div>

<script>
const TRACKS = [
  { file: 'music/rr-1 - Clockwork Infinity.mp3',       title: 'Clockwork Infinity' },
  { file: 'music/rr-2 - Waiting for the Waymo.mp3',    title: 'Waiting for the Waymo' },
  { file: "music/rr-2 - Today is Yesterday x Make 'em say Errr.mp3", title: "Today is Yesterday x Make 'em say Errr" },
  { file: 'music/rr-3 - I Got Hosts.mp3',              title: 'I Got Hosts' },
  { file: 'music/rr-4 - Fender Bender.mp3',            title: 'Fender Bender' },
  { file: 'music/rr-5 - Goodtime.mp3',                 title: 'Goodtime' },
  { file: 'music/rr-6 - Treading Water.mp3',           title: 'Treading Water' },
  { file: 'music/rr-8 - Rogue Machine x Goodtime.mp3', title: 'Rogue Machine x Goodtime' },
  { file: 'music/rr-9 - Barbra Streisand x Eduardo Saverin.mp3', title: 'Barbra Streisand x Eduardo Saverin' },
  { file: 'music/rr-10 - Rock Lobster.mp3',            title: 'Rock Lobster' },
  { file: 'music/rr-11 - Orange Chicken.mp3',          title: 'Orange Chicken' },
];

let actx, analyser, audioEl, dataArray, freqArray, currentTrack = 4;
let canvas, c, trailCanvas, tc;
let phase = 0, playing = false;
let particles = [];
let stars = [];
let prevBass = 0;

function startViz() {
  document.getElementById('start').classList.add('hidden');

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  actx = new AudioCtx();
  analyser = actx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.78;

  audioEl = new Audio();
  audioEl.crossOrigin = 'anonymous';
  audioEl.volume = 0.5;
  const source = actx.createMediaElementSource(audioEl);
  source.connect(analyser);
  analyser.connect(actx.destination);

  dataArray = new Uint8Array(analyser.fftSize);
  freqArray = new Uint8Array(analyser.frequencyBinCount);

  canvas = document.getElementById('viz');
  c = canvas.getContext('2d');

  // Trail canvas for persistence effect
  trailCanvas = document.createElement('canvas');
  tc = trailCanvas.getContext('2d');

  resize();
  window.addEventListener('resize', resize);
  initStars();

  loadTrack(currentTrack);
  audioEl.play();
  playing = true;
  audioEl.addEventListener('ended', () => { currentTrack = (currentTrack + 1) % TRACKS.length; loadTrack(currentTrack); audioEl.play(); });

  draw();
}

function loadTrack(i) {
  currentTrack = i;
  audioEl.src = TRACKS[i].file;
  document.getElementById('viz-track').textContent = TRACKS[i].title;
}

function togglePause() {
  if (playing) { audioEl.pause(); playing = false; }
  else { audioEl.play(); playing = true; }
  document.getElementById('pp-icon').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="7,3 21,12 7,21"/>';
}
function nextTrack() { loadTrack((currentTrack + 1) % TRACKS.length); if (playing) audioEl.play(); }
function prevTrack() { loadTrack((currentTrack - 1 + TRACKS.length) % TRACKS.length); if (playing) audioEl.play(); }

function resize() {
  const dpr = devicePixelRatio;
  canvas.width = trailCanvas.width = window.innerWidth * dpr;
  canvas.height = trailCanvas.height = window.innerHeight * dpr;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  initStars();
}

function initStars() {
  stars = [];
  const count = 80;
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 0.3 + Math.random() * 1.5,
      baseAlpha: 0.15 + Math.random() * 0.6,
      twinkleSpeed: 0.5 + Math.random() * 2,
      twinkleOffset: Math.random() * Math.PI * 2,
      isCyan: Math.random() < 0.15,
    });
  }
}

function spawnParticles(cx, cy, energy, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (1 + Math.random() * 3) * energy;
    const isCyan = Math.random() < 0.35;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed * devicePixelRatio,
      vy: Math.sin(angle) * speed * devicePixelRatio,
      life: 1,
      decay: 0.008 + Math.random() * 0.015,
      r: (0.5 + Math.random() * 1.5) * devicePixelRatio,
      cyan: isCyan,
    });
  }
}

function draw() {
  requestAnimationFrame(draw);
  if (!analyser) return;

  analyser.getByteTimeDomainData(dataArray);
  analyser.getByteFrequencyData(freqArray);

  const w = canvas.width, h = canvas.height, dpr = devicePixelRatio;

  const bass = avg(freqArray, 0, 10) / 255;
  const subBass = avg(freqArray, 0, 4) / 255;
  const mid = avg(freqArray, 10, 80) / 255;
  const high = avg(freqArray, 80, 300) / 255;
  const presence = avg(freqArray, 300, 600) / 255;
  const total = avg(freqArray, 0, 400) / 255;

  phase += 0.006 + total * 0.025;

  // Beat detection — spawn particles on transients
  const bassJump = bass - prevBass;
  if (bassJump > 0.15) {
    spawnParticles(w * 0.52, h * 0.48, bassJump * 3, Math.floor(8 + bassJump * 40));
  }
  prevBass = bass * 0.7 + prevBass * 0.3;

  // ── TRAIL PERSISTENCE ────────────────────────────────
  // Copy current frame to trail canvas with fade
  tc.drawImage(canvas, 0, 0);
  c.clearRect(0, 0, w, h);
  c.globalAlpha = 0.82 + total * 0.1; // trails linger more when quiet
  c.drawImage(trailCanvas, 0, 0);
  c.globalAlpha = 1;
  // Fade the trail canvas
  tc.fillStyle = 'rgba(2,2,4,0.12)';
  tc.fillRect(0, 0, w, h);

  // ── STARS (reactive twinkle) ─────────────────────────
  const time = performance.now() / 1000;
  for (const s of stars) {
    const twinkle = Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    const energyBoost = s.isCyan ? high * 0.4 : mid * 0.3;
    const alpha = Math.max(0, s.baseAlpha * (0.5 + twinkle * 0.5) + energyBoost);
    const r = s.r + (s.isCyan ? high : bass) * 1.5 * dpr;
    c.beginPath();
    c.arc(s.x, s.y, r, 0, Math.PI * 2);
    c.fillStyle = s.isCyan
      ? `rgba(78,201,212,${alpha})`
      : `rgba(245,238,221,${alpha})`;
    c.fill();
    // Glow on bright stars
    if (s.r > 1 && alpha > 0.4) {
      c.beginPath();
      c.arc(s.x, s.y, r * 3, 0, Math.PI * 2);
      c.fillStyle = s.isCyan
        ? `rgba(78,201,212,${alpha * 0.12})`
        : `rgba(245,238,221,${alpha * 0.1})`;
      c.fill();
    }
  }

  // ── HOT EVENT ────────────────────────────────────────
  const ex = w * 0.52, ey = h * 0.48;
  const eventR = (60 + bass * 180 + subBass * 60) * dpr;

  // Outer halo
  const halo = c.createRadialGradient(ex, ey, 0, ex, ey, eventR * 3.5);
  halo.addColorStop(0, `rgba(232,184,88,${0.05 + bass * 0.08})`);
  halo.addColorStop(0.3, `rgba(217,164,65,${0.02 + bass * 0.03})`);
  halo.addColorStop(1, 'rgba(139,90,30,0)');
  c.fillStyle = halo;
  c.fillRect(0, 0, w, h);

  // Core
  const core = c.createRadialGradient(ex, ey, 0, ex, ey, eventR);
  core.addColorStop(0, `rgba(255,242,200,${0.65 + bass * 0.35})`);
  core.addColorStop(0.06, `rgba(255,223,138,${0.4 + bass * 0.25})`);
  core.addColorStop(0.2, `rgba(232,184,88,${0.18 + bass * 0.12})`);
  core.addColorStop(0.5, `rgba(217,164,65,${0.04 + bass * 0.05})`);
  core.addColorStop(1, 'rgba(139,90,30,0)');
  c.beginPath(); c.arc(ex, ey, eventR, 0, Math.PI * 2);
  c.fillStyle = core; c.fill();

  // Singularity
  const sr = (2 + bass * 4 + subBass * 2) * dpr;
  c.beginPath(); c.arc(ex, ey, sr, 0, Math.PI * 2);
  c.fillStyle = `rgba(255,255,255,${0.85 + bass * 0.15})`; c.fill();
  c.beginPath(); c.arc(ex, ey, sr * 2.5, 0, Math.PI * 2);
  c.fillStyle = `rgba(255,242,200,${0.25 + bass * 0.2})`; c.fill();

  // Diffraction spikes — 4-point, rotating slightly with energy
  const spikeAngle = total * 0.3;
  const sLen = (20 + bass * 40 + subBass * 20) * dpr;
  c.strokeStyle = `rgba(255,230,176,${0.25 + bass * 0.35})`;
  c.lineWidth = (0.5 + bass * 0.5) * dpr;
  for (let a = 0; a < 4; a++) {
    const ang = spikeAngle + a * Math.PI / 2;
    const len = a % 2 === 0 ? sLen : sLen * 0.65;
    c.beginPath();
    c.moveTo(ex - Math.cos(ang) * len, ey - Math.sin(ang) * len);
    c.lineTo(ex + Math.cos(ang) * len, ey + Math.sin(ang) * len);
    c.stroke();
  }

  // ── PARTICLES ────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    c.beginPath();
    c.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    c.fillStyle = p.cyan
      ? `rgba(78,201,212,${p.life * 0.7})`
      : `rgba(232,184,88,${p.life * 0.8})`;
    c.fill();
  }

  // ── SIGNAL WAVEFORMS ─────────────────────────────────
  const waveY = h * 0.48;
  const wsx = w * 0.08, wex = w * 0.92;
  const ww = wex - wsx;
  const pts = 300;
  const step = Math.floor(dataArray.length / pts);

  // Helper: draw a smooth waveform
  function drawWave(color, glowColor, alpha, amplitude, freqMul, phaseMul, phaseOff, yOff, lineW, glowR, dataOff) {
    c.beginPath();
    c.lineWidth = lineW * dpr;
    c.strokeStyle = `rgba(${color},${alpha})`;
    c.shadowColor = `rgba(${glowColor})`;
    c.shadowBlur = glowR * dpr;
    const xPts = [];
    const yPts = [];
    for (let i = 0; i < pts; i++) {
      const x = wsx + (i / pts) * ww;
      const idx = Math.min(i * step + dataOff, dataArray.length - 1);
      const sample = (dataArray[idx] - 128) / 128;
      const env = Math.sin((i / pts) * Math.PI);
      const envEdge = Math.pow(env, 0.8); // softer edge fade
      const drift = Math.sin(phase * phaseMul + i * freqMul + phaseOff) * 14 * dpr;
      const y = waveY + yOff * dpr + sample * amplitude * dpr * envEdge + drift;
      xPts.push(x);
      yPts.push(y);
    }
    // Draw as bezier curve for smoothness
    c.moveTo(xPts[0], yPts[0]);
    for (let i = 1; i < pts - 1; i++) {
      const cpx = (xPts[i] + xPts[i + 1]) / 2;
      const cpy = (yPts[i] + yPts[i + 1]) / 2;
      c.quadraticCurveTo(xPts[i], yPts[i], cpx, cpy);
    }
    c.stroke();
    c.shadowBlur = 0;
  }

  // Amber wave (human — mid reactive)
  const amberA = 0.55 + mid * 0.45;
  const amberW = 1.6 + mid * 2;
  drawWave('232,184,88', '232,184,88,0.45', amberA, 50 + mid * 30, 0.028, 1, 0, 0, amberW, 14, 0);

  // Cyan wave (machine — high reactive)
  const cyanA = 0.4 + high * 0.5;
  const cyanW = 1.1 + high * 1.8;
  drawWave('78,201,212', '78,201,212,0.4', cyanA, 38 + high * 25, 0.045, 1.4, 1.8, -10, cyanW, 12, Math.floor(step * 0.4));

  // Bone wave (raw — total energy, very subtle)
  const boneA = 0.08 + total * 0.18;
  drawWave('240,235,219', '240,235,219,0.15', boneA, 22 + total * 15, 0.035, 0.7, 3.5, 8, 0.7, 0, Math.floor(step * 0.7));

  // ── PRESENCE SHIMMER (high-freq aura around waves) ───
  if (presence > 0.1) {
    c.globalAlpha = presence * 0.15;
    for (let i = 0; i < 40; i++) {
      const x = wsx + Math.random() * ww;
      const spread = (20 + presence * 40) * dpr;
      const y = waveY + (Math.random() - 0.5) * spread;
      const r = (0.3 + Math.random() * 0.8) * dpr;
      c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2);
      c.fillStyle = Math.random() < 0.5 ? 'rgba(78,201,212,0.6)' : 'rgba(232,184,88,0.5)';
      c.fill();
    }
    c.globalAlpha = 1;
  }

  // ── CIRCULAR SPECTRUM (orbiting the hot event) ───────
  const specBands = 90;
  const specRadius = (100 + bass * 40) * dpr;
  c.globalAlpha = 0.08 + total * 0.07;
  for (let i = 0; i < specBands; i++) {
    const angle = (i / specBands) * Math.PI * 2 + phase * 0.3;
    const fi = Math.floor((i / specBands) * freqArray.length * 0.3);
    const val = freqArray[fi] / 255;
    const barLen = val * 50 * dpr;
    const x1 = ex + Math.cos(angle) * specRadius;
    const y1 = ey + Math.sin(angle) * specRadius;
    const x2 = ex + Math.cos(angle) * (specRadius + barLen);
    const y2 = ey + Math.sin(angle) * (specRadius + barLen);
    const t = i / specBands;
    c.strokeStyle = t < 0.5
      ? `rgba(232,184,88,${0.5 + val * 0.5})`
      : `rgba(78,201,212,${0.4 + val * 0.5})`;
    c.lineWidth = (1 + val * 1.5) * dpr;
    c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
  }
  c.globalAlpha = 1;
}

function avg(arr, from, to) {
  let s = 0; const end = Math.min(to, arr.length);
  for (let i = from; i < end; i++) s += arr[i];
  return s / (end - from);
}
</script>
</body>
</html>
