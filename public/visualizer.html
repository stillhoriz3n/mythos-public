<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORIZ3N — Signal Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=Fraunces:ital,opsz,wght@1,9..144,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stage-center: #1f1a2a;
    --stage-mid: #14121c;
    --stage-deep: #08070d;
    --stage-void: #020204;
    --signal-machine: #4ec9d4;
    --signal-synth: #e8b858;
    --core-white: #ffffff;
    --core-halo: #fff2c8;
    --ink-bright: #e8e3d4;
    --ink-soft: #b5b0a3;
    --ink-dim: #8a8574;
    --ink-faint: #4a4740;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--stage-void);
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink-bright);
    -webkit-font-smoothing: antialiased;
  }

  canvas#viz {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* Starfield behind everything */
  .starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Cosmic ground */
  .ground {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 50% 55%, var(--stage-center) 0%, var(--stage-mid) 25%, var(--stage-deep) 55%, var(--stage-void) 100%);
  }

  /* UI overlay */
  .ui {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 36px;
  }

  .ui-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .ui-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .title-block h1 {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 6vw, 72px);
    line-height: 1.0;
    letter-spacing: -0.02em;
    color: var(--signal-synth);
    pointer-events: auto;
  }
  .title-block h1 .machine { color: var(--signal-machine); }
  .title-block h1 .amp {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144;
    font-weight: 300;
    font-style: italic;
    font-size: 1.3em;
    color: var(--signal-synth);
  }

  .credit {
    text-align: right;
  }
  .credit .primary {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .18em;
    color: var(--signal-synth);
  }
  .credit .secondary {
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--ink-dim);
    margin-top: 4px;
  }

  .track-info {
    pointer-events: auto;
  }
  .track-info .now-playing {
    font-size: 10px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--signal-synth);
    margin-bottom: 8px;
    opacity: .7;
  }
  .track-info .track-name {
    font-family: 'Archivo', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink-bright);
    letter-spacing: .01em;
  }
  .track-info .album-name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    color: var(--ink-dim);
    margin-top: 4px;
  }

  /* Prompt to start */
  .start-prompt {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(2,2,4,.85);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    cursor: pointer;
  }
  .start-prompt .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--signal-synth);
  }
  .start-prompt .play-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid var(--signal-synth);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .start-prompt:hover .play-circle {
    background: var(--signal-synth);
    box-shadow: 0 0 40px rgba(232,184,88,.4);
  }
  .start-prompt .play-circle svg {
    width: 24px; height: 24px;
    fill: var(--signal-synth);
  }
  .start-prompt:hover .play-circle svg { fill: var(--stage-void); }
  .start-prompt.hidden { display: none; }

  /* Emblem */
  .emblem { opacity: .6; }

  @media (max-width: 600px) {
    .ui { padding: 16px 20px; }
    .title-block h1 { font-size: 32px; }
    .track-info .track-name { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="ground"></div>

<!-- Starfield -->
<svg class="starfield" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2"/></filter></defs>
  <g filter="url(#glow)">
    <circle cx="145" cy="215" r="1.8" fill="#f5eedd" opacity=".9"/>
    <circle cx="870" cy="165" r="1.6" fill="#f5eedd" opacity=".85"/>
    <circle cx="1350" cy="280" r="1.5" fill="#f5eedd" opacity=".8"/>
    <circle cx="420" cy="680" r="1.7" fill="#f5eedd" opacity=".85"/>
    <circle cx="1480" cy="750" r="1.4" fill="#f5eedd" opacity=".8"/>
  </g>
  <g fill="#e8dfc8" opacity=".6">
    <circle cx="80" cy="110" r=".8"/><circle cx="520" cy="180" r=".7"/><circle cx="950" cy="340" r=".8"/>
    <circle cx="1200" cy="150" r=".7"/><circle cx="160" cy="480" r=".8"/><circle cx="780" cy="620" r=".7"/>
    <circle cx="1300" cy="600" r=".8"/><circle cx="450" cy="850" r=".7"/><circle cx="1100" cy="850" r=".8"/>
  </g>
  <g fill="#9fd8df" opacity=".4">
    <circle cx="225" cy="315" r=".6"/><circle cx="750" cy="350" r=".7"/><circle cx="1050" cy="550" r=".6"/>
    <circle cx="350" cy="700" r=".6"/><circle cx="1380" cy="680" r=".7"/>
  </g>
  <!-- Filaments -->
  <path d="M 80 380 C 200 410,400 420,600 400 C 720 390,850 410,1000 440" fill="none" stroke="#6a5a7a" stroke-width=".5" opacity=".25" stroke-linecap="round"/>
  <path d="M 1200 200 C 1260 240,1320 300,1350 380" fill="none" stroke="#8b6a3a" stroke-width=".4" opacity=".18" stroke-linecap="round"/>
</svg>

<canvas id="viz"></canvas>

<div class="ui">
  <div class="ui-top">
    <svg class="emblem" viewBox="0 0 70 60" width="32" height="28" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#e8b858" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.4" opacity=".9"/>
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".9" opacity=".8" fill="#e8b858" fill-opacity=".1"/>
        <circle cx="35" cy="30" r="1.8" fill="#ffe6a0" opacity=".95"/>
      </g>
    </svg>
    <div class="credit">
      <div class="primary">HORIZ3N</div>
      <div class="secondary">Prime Radiant &middot; 2026</div>
    </div>
  </div>
  <div class="ui-bottom">
    <div class="track-info">
      <div class="now-playing">&#10022; now playing</div>
      <div class="track-name" id="viz-track">Fender Bender</div>
      <div class="album-name" id="viz-album">Robots &amp; Remixes</div>
    </div>
    <div class="title-block">
      <h1><span class="machine">ROBOTS</span><br><span class="amp">&amp;</span> REMIXES</h1>
    </div>
  </div>
</div>

<!-- Start prompt (browsers require interaction before audio context) -->
<div class="start-prompt" id="start" onclick="startViz()">
  <div class="play-circle">
    <svg viewBox="0 0 24 24"><polygon points="7,3 21,12 7,21"/></svg>
  </div>
  <div class="label">click to play</div>
</div>

<script>
const TRACKS = [
  { file: 'music/rr-1 - Clockwork Infinity.mp3',       title: 'Clockwork Infinity' },
  { file: 'music/rr-2 - Waiting for the Waymo.mp3',    title: 'Waiting for the Waymo' },
  { file: "music/rr-2 - Today is Yesterday x Make 'em say Errr.mp3", title: "Today is Yesterday x Make 'em say Errr" },
  { file: 'music/rr-3 - I Got Hosts.mp3',              title: 'I Got Hosts' },
  { file: 'music/rr-4 - Fender Bender.mp3',            title: 'Fender Bender' },
  { file: 'music/rr-5 - Goodtime.mp3',                 title: 'Goodtime' },
  { file: 'music/rr-6 - Treading Water.mp3',           title: 'Treading Water' },
  { file: 'music/rr-8 - Rogue Machine x Goodtime.mp3', title: 'Rogue Machine x Goodtime' },
  { file: 'music/rr-9 - Barbra Streisand x Eduardo Saverin.mp3', title: 'Barbra Streisand x Eduardo Saverin' },
  { file: 'music/rr-10 - Rock Lobster.mp3',            title: 'Rock Lobster' },
  { file: 'music/rr-11 - Orange Chicken.mp3',          title: 'Orange Chicken' },
];

let ctx, analyser, audioEl, dataArray, freqArray, currentTrack = 4; // Fender Bender
let canvas, c;
let animId;
let phase = 0;

function startViz() {
  document.getElementById('start').classList.add('hidden');

  // Audio setup
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  ctx = new AudioCtx();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;

  audioEl = new Audio();
  audioEl.crossOrigin = 'anonymous';
  audioEl.volume = 0.5;
  const source = ctx.createMediaElementSource(audioEl);
  source.connect(analyser);
  analyser.connect(ctx.destination);

  dataArray = new Uint8Array(analyser.fftSize);
  freqArray = new Uint8Array(analyser.frequencyBinCount);

  // Canvas
  canvas = document.getElementById('viz');
  c = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  loadTrack(currentTrack);
  audioEl.play();
  audioEl.addEventListener('ended', () => { currentTrack = (currentTrack + 1) % TRACKS.length; loadTrack(currentTrack); audioEl.play(); });

  draw();
}

function loadTrack(i) {
  audioEl.src = TRACKS[i].file;
  document.getElementById('viz-track').textContent = TRACKS[i].title;
}

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
}

function draw() {
  animId = requestAnimationFrame(draw);
  if (!analyser) return;

  analyser.getByteTimeDomainData(dataArray);
  analyser.getByteFrequencyData(freqArray);

  const w = canvas.width;
  const h = canvas.height;
  const dpr = devicePixelRatio;

  c.clearRect(0, 0, w, h);

  // Get energy levels
  const bassEnergy = avg(freqArray, 0, 8) / 255;
  const midEnergy = avg(freqArray, 8, 64) / 255;
  const highEnergy = avg(freqArray, 64, 200) / 255;
  const totalEnergy = avg(freqArray, 0, 200) / 255;

  phase += 0.008 + totalEnergy * 0.02;

  // Hot event — pulsing with bass
  const cx = w * 0.52;
  const cy = h * 0.48;
  const eventRadius = (80 + bassEnergy * 120) * dpr;

  // Outer halo
  const haloGrad = c.createRadialGradient(cx, cy, 0, cx, cy, eventRadius * 3);
  haloGrad.addColorStop(0, `rgba(232,184,88,${0.04 + bassEnergy * 0.06})`);
  haloGrad.addColorStop(0.4, `rgba(217,164,65,${0.015 + bassEnergy * 0.02})`);
  haloGrad.addColorStop(1, 'rgba(217,164,65,0)');
  c.fillStyle = haloGrad;
  c.fillRect(0, 0, w, h);

  // Core bloom
  const coreGrad = c.createRadialGradient(cx, cy, 0, cx, cy, eventRadius);
  coreGrad.addColorStop(0, `rgba(255,242,200,${0.6 + bassEnergy * 0.35})`);
  coreGrad.addColorStop(0.08, `rgba(255,223,138,${0.35 + bassEnergy * 0.2})`);
  coreGrad.addColorStop(0.25, `rgba(232,184,88,${0.15 + bassEnergy * 0.1})`);
  coreGrad.addColorStop(0.5, `rgba(217,164,65,${0.04 + bassEnergy * 0.04})`);
  coreGrad.addColorStop(1, 'rgba(139,90,30,0)');
  c.beginPath();
  c.arc(cx, cy, eventRadius, 0, Math.PI * 2);
  c.fillStyle = coreGrad;
  c.fill();

  // White singularity
  const singR = (2.5 + bassEnergy * 3) * dpr;
  c.beginPath();
  c.arc(cx, cy, singR, 0, Math.PI * 2);
  c.fillStyle = `rgba(255,255,255,${0.8 + bassEnergy * 0.2})`;
  c.fill();

  // Diffraction spikes
  c.strokeStyle = `rgba(255,230,176,${0.3 + bassEnergy * 0.3})`;
  c.lineWidth = 0.6 * dpr;
  const spikeLen = (15 + bassEnergy * 25) * dpr;
  c.beginPath(); c.moveTo(cx - spikeLen, cy); c.lineTo(cx + spikeLen, cy); c.stroke();
  c.beginPath(); c.moveTo(cx, cy - spikeLen * 0.7); c.lineTo(cx, cy + spikeLen * 0.7); c.stroke();

  // ── SIGNAL WAVEFORMS ──────────────────────────────────
  const waveY = h * 0.48;
  const waveStartX = w * 0.12;
  const waveEndX = w * 0.88;
  const waveWidth = waveEndX - waveStartX;
  const points = 200;
  const step = Math.floor(dataArray.length / points);

  // Amber waveform (human signal — lower frequency, smoother)
  c.beginPath();
  c.lineWidth = (1.8 + midEnergy * 1.5) * dpr;
  c.strokeStyle = `rgba(232,184,88,${0.6 + midEnergy * 0.4})`;
  c.shadowColor = 'rgba(232,184,88,0.4)';
  c.shadowBlur = 12 * dpr;
  for (let i = 0; i < points; i++) {
    const x = waveStartX + (i / points) * waveWidth;
    const sample = (dataArray[i * step] - 128) / 128;
    const envelope = Math.sin((i / points) * Math.PI); // fade at edges
    const drift = Math.sin(phase + i * 0.03) * 12 * dpr;
    const y = waveY + sample * 45 * dpr * envelope + drift;
    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
  }
  c.stroke();
  c.shadowBlur = 0;

  // Cyan waveform (machine signal — higher frequency, more reactive)
  c.beginPath();
  c.lineWidth = (1.2 + highEnergy * 1.2) * dpr;
  c.strokeStyle = `rgba(78,201,212,${0.45 + highEnergy * 0.4})`;
  c.shadowColor = 'rgba(78,201,212,0.35)';
  c.shadowBlur = 10 * dpr;
  for (let i = 0; i < points; i++) {
    const x = waveStartX + (i / points) * waveWidth;
    // Offset in the data array for different frequency content
    const idx = Math.min(i * step + Math.floor(step * 0.5), dataArray.length - 1);
    const sample = (dataArray[idx] - 128) / 128;
    const envelope = Math.sin((i / points) * Math.PI);
    const drift = Math.sin(phase * 1.3 + i * 0.05 + 1.8) * 10 * dpr;
    const y = waveY - 8 * dpr + sample * 35 * dpr * envelope + drift;
    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
  }
  c.stroke();
  c.shadowBlur = 0;

  // Bone waveform (human raw signal — subtle, quieter third voice)
  c.beginPath();
  c.lineWidth = 0.8 * dpr;
  c.strokeStyle = `rgba(240,235,219,${0.12 + totalEnergy * 0.15})`;
  for (let i = 0; i < points; i++) {
    const x = waveStartX + (i / points) * waveWidth;
    const idx = Math.min(i * step + step, dataArray.length - 1);
    const sample = (dataArray[idx] - 128) / 128;
    const envelope = Math.sin((i / points) * Math.PI);
    const drift = Math.sin(phase * 0.7 + i * 0.04 + 3.5) * 8 * dpr;
    const y = waveY + 6 * dpr + sample * 20 * dpr * envelope + drift;
    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
  }
  c.stroke();

  // ── FREQUENCY BARS (very subtle, bottom edge) ─────────
  const barCount = 64;
  const barW = (w * 0.6) / barCount;
  const barStartX = w * 0.2;
  const barMaxH = 60 * dpr;
  c.globalAlpha = 0.12 + totalEnergy * 0.08;
  for (let i = 0; i < barCount; i++) {
    const fi = Math.floor((i / barCount) * freqArray.length * 0.4);
    const val = freqArray[fi] / 255;
    const bh = val * barMaxH;
    const x = barStartX + i * barW;
    // Gradient from amber to cyan across frequency range
    const t = i / barCount;
    const r = Math.round(78 + (232 - 78) * (1 - t));
    const g = Math.round(201 + (184 - 201) * (1 - t));
    const b = Math.round(212 + (88 - 212) * (1 - t));
    c.fillStyle = `rgb(${r},${g},${b})`;
    c.fillRect(x, h - bh - 20 * dpr, barW - 1, bh);
  }
  c.globalAlpha = 1;
}

function avg(arr, from, to) {
  let sum = 0;
  for (let i = from; i < to && i < arr.length; i++) sum += arr[i];
  return sum / (to - from);
}
</script>
</body>
</html>
