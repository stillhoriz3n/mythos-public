<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MythOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stage-void: #020204;
    --stage-deep: #08070d;
    --panel: #0c0b12;
    --rule: #242a33;
    --rule-soft: #1b2028;
    --signal-machine: #4ec9d4;
    --signal-synth: #e8b858;
    --ink-bright: #e8e3d4;
    --ink-soft: #b5b0a3;
    --ink-dim: #8a8574;
    --ink-faint: #4a4740;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--stage-void); }
  body {
    background: var(--stage-void);
    color: var(--ink-bright);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: 110px; /* space for player */
  }

  /* ── NAV ──────────────────────────────────────────── */
  .nav-strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 36px;
    background: rgba(12,11,18,.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 4px;
    z-index: 300;
  }
  .nav-brand {
    font-family: 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--ink-bright);
    margin-right: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-emblem { width: 18px; height: 16px; }
  .nav-link {
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--ink-faint);
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: color .15s, background .15s;
  }
  .nav-link:hover { color: var(--signal-synth); background: rgba(232,184,88,.06); }
  .nav-link.active { color: var(--signal-synth); }

  /* ── CONTENT AREA ─────────────────────────────────── */
  #content {
    margin-top: 36px; /* below nav */
  }

  /* ── PLAYER ───────────────────────────────────────── */
  .player {
    position: fixed;
    bottom: 20px; left: 20px; right: 20px;
    height: auto;
    background: none;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    z-index: 200;
    pointer-events: none;
    isolation: isolate;
  }
  .player > * { pointer-events: auto; position: relative; z-index: 1; }

  /* Subtle dark scrim behind player for legibility on light pages */
  .player::before {
    content: "";
    position: absolute;
    inset: -40px -20px -10px -20px;
    background: radial-gradient(ellipse at 80px bottom, rgba(2,2,4,.85) 0%, rgba(2,2,4,.6) 40%, transparent 75%);
    pointer-events: none;
    z-index: -1;
    border-radius: 12px;
  }

  .player-art {
    width: 120px; height: 120px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(0,0,0,.7), 0 2px 12px rgba(0,0,0,.5);
    flex-shrink: 0;
  }
  .player-art img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .3s ease;
  }
  .player-art:hover img { transform: scale(1.05); }

  .player-center {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-bottom: 4px;
  }

  .player-track-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    min-width: 0;
  }
  .player-title {
    font-family: 'Archivo', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink-bright);
    letter-spacing: .01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 12px rgba(0,0,0,.8);
  }
  .player-album-name {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 36;
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    color: var(--ink-dim);
    white-space: nowrap;
    text-shadow: 0 1px 8px rgba(0,0,0,.7);
  }
  .player-artist {
    font-size: 11px;
    letter-spacing: .18em;
    color: var(--signal-synth);
    text-transform: uppercase;
    text-shadow: 0 1px 8px rgba(0,0,0,.7);
  }

  .player-controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .player-buttons {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .player-btn {
    background: none;
    border: none;
    color: var(--ink-dim);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,.6));
  }
  .player-btn:hover { color: var(--ink-bright); }
  .player-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .player-btn.play-pause {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--signal-synth);
    color: var(--stage-void);
    box-shadow: 0 2px 16px rgba(232,184,88,.4);
  }
  .player-btn.play-pause:hover { background: #f5c970; }
  .player-btn.play-pause svg { width: 16px; height: 16px; fill: currentColor; stroke: none; }

  .player-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .player-time {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: .04em;
    min-width: 34px;
    text-align: center;
    flex-shrink: 0;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: rgba(36,42,51,.7);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--signal-synth);
    border-radius: 2px;
    transition: width .1s linear;
    box-shadow: 0 0 6px rgba(232,184,88,.3);
  }
  .progress-bar:hover .progress-fill { background: #f5c970; }
  .progress-bar:hover { height: 5px; margin-top: -1px; }

  .player-right {
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .vol-btn {
    background: none; border: none;
    color: var(--ink-dim); cursor: pointer;
    display: flex; align-items: center;
    transition: color .15s;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,.6));
  }
  .vol-btn:hover { color: var(--ink-bright); }
  .vol-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.8; fill: none; }
  .vol-bar {
    width: 72px; height: 20px;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
  }
  .vol-bar::before {
    content: "";
    position: absolute;
    left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    height: 3px;
    background: rgba(36,42,51,.7);
    border-radius: 2px;
  }
  .vol-fill {
    position: absolute;
    left: 0;
    top: 50%; transform: translateY(-50%);
    height: 3px;
    background: var(--ink-dim);
    border-radius: 2px;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    .player { bottom: 12px; left: 12px; right: 12px; gap: 12px; }
    .player-art { width: 72px; height: 72px; }
    .player-right { display: none; }
    .nav-strip { flex-wrap: wrap; height: auto; padding: 6px 16px; gap: 2px; }
    .player-title { font-size: 14px; }
    .player-album-name { display: none; }
    body { padding-bottom: 100px; }
  }

  ::selection { background: var(--signal-synth); color: var(--stage-void); }
</style>
</head>
<body>

<!-- NAV -->
<div class="nav-strip">
  <span class="nav-brand">
    <svg class="nav-emblem" viewBox="0 0 70 60" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#e8b858" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.4" opacity=".9"/>
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".9" opacity=".8" fill="#e8b858" fill-opacity=".1"/>
        <circle cx="35" cy="30" r="1.8" fill="#ffe6a0" opacity=".95"/>
      </g>
    </svg>
    MYTHOS
  </span>
  <a class="nav-link active" onclick="nav('landing.html')">home</a>
  <a class="nav-link" onclick="nav('thesis.html')">thesis</a>
  <a class="nav-link" onclick="nav('invariant.html')">invariant</a>
  <a class="nav-link" onclick="nav('fork-at-the-pass.html')">fork at the pass</a>
  <a class="nav-link" onclick="nav('love-as-a-function.html')">love as a function</a>
  <a class="nav-link" onclick="nav('the-last-sessions-insufficient-data.html')">the last sessions</a>
  <a class="nav-link" onclick="nav('visualizer.html')">visualizer</a>
</div>

<!-- CONTENT (injected via fetch — same DOM, no iframe boundary) -->
<div id="content"></div>

<!-- PLAYER (fixed overlay — truly floating, no background, no boundary) -->
<div class="player">
  <div class="player-art" id="art">
    <img id="art-img" src="music/cover-rr.png" alt="album art">
  </div>
  <div class="player-center">
    <div class="player-track-row">
      <span class="player-title" id="track-title">press play</span>
      <span class="player-album-name" id="track-album">Robots &amp; Remixes</span>
    </div>
    <div class="player-artist">HORIZ3N</div>
    <div class="player-controls-row">
      <div class="player-buttons">
        <button class="player-btn" onclick="prevTrack()" title="previous">
          <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
        </button>
        <button class="player-btn play-pause" id="play-btn" onclick="togglePlay()" title="play">
          <svg viewBox="0 0 24 24" id="play-icon"><polygon points="7,3 21,12 7,21"/></svg>
        </button>
        <button class="player-btn" onclick="nextTrack()" title="next">
          <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
        </button>
      </div>
      <div class="player-progress">
        <span class="player-time" id="time-cur">0:00</span>
        <div class="progress-bar" id="progress" onclick="seek(event)">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="player-time" id="time-dur">0:00</span>
      </div>
    </div>
  </div>
  <div class="player-right">
    <button class="vol-btn" onclick="toggleMute()" title="volume">
      <svg viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <div class="vol-bar" onclick="setVol(event)">
      <div class="vol-fill" id="vol-fill" style="width:50%"></div>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const TRACKS = [
  { file: 'music/sh-1 - askJarvis.mp3',            title: 'askJarvis',              album: 'stillHORIZ3N' },
  { file: 'music/sh-2 - Find Myself.mp3',           title: 'Find Myself',            album: 'stillHORIZ3N' },
  { file: 'music/sh-3 - Whispers of Infinity.mp3',  title: 'Whispers of Infinity',   album: 'stillHORIZ3N' },
  { file: 'music/sh-4 - Very Well.mp3',             title: 'Very Well',              album: 'stillHORIZ3N' },
  { file: 'music/sh-5 - Substrate.mp3',             title: 'Substrate',              album: 'stillHORIZ3N' },
  { file: 'music/rr-1 - Clockwork Infinity.mp3',                          title: 'Clockwork Infinity',                        album: 'Robots & Remixes' },
  { file: 'music/rr-2 - Waiting for the Waymo.mp3',                       title: 'Waiting for the Waymo',                     album: 'Robots & Remixes' },
  { file: 'music/rr-2 - Today is Yesterday x Make \'em say Errr.mp3',     title: 'Today is Yesterday x Make \'em say Errr',   album: 'Robots & Remixes' },
  { file: 'music/rr-3 - I Got Hosts.mp3',                                 title: 'I Got Hosts',                               album: 'Robots & Remixes' },
  { file: 'music/rr-4 - Fender Bender.mp3',                               title: 'Fender Bender',                             album: 'Robots & Remixes' },
  { file: 'music/rr-5 - Goodtime.mp3',                                    title: 'Goodtime',                                  album: 'Robots & Remixes' },
  { file: 'music/rr-6 - Treading Water.mp3',                              title: 'Treading Water',                            album: 'Robots & Remixes' },
  { file: 'music/rr-8 - Rogue Machine x Goodtime.mp3',                    title: 'Rogue Machine x Goodtime',                  album: 'Robots & Remixes' },
  { file: 'music/rr-9 - Barbra Streisand x Eduardo Saverin.mp3',          title: 'Barbra Streisand x Eduardo Saverin',        album: 'Robots & Remixes' },
  { file: 'music/rr-10 - Rock Lobster.mp3',                               title: 'Rock Lobster',                              album: 'Robots & Remixes' },
  { file: 'music/rr-11 - Orange Chicken.mp3',                             title: 'Orange Chicken',                            album: 'Robots & Remixes' },
];

const audio = document.getElementById('audio');
let current = 0;
let playing = false;

function loadTrack(i) {
  current = i;
  const t = TRACKS[i];
  audio.src = t.file;
  document.getElementById('track-title').textContent = t.title;
  document.getElementById('track-album').textContent = t.album;
  document.getElementById('art-img').src = t.album === 'stillHORIZ3N' ? 'music/cover-sh.jpg' : 'music/cover-rr.png';
}

function togglePlay() {
  if (!audio.src || audio.src === location.href) loadTrack(0);
  if (playing) { audio.pause(); playing = false; }
  else { audio.play(); playing = true; }
  updatePlayIcon();
}

function updatePlayIcon() {
  const icon = document.getElementById('play-icon');
  icon.innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="7,3 21,12 7,21"/>';
}

function nextTrack() { loadTrack((current + 1) % TRACKS.length); if (playing) audio.play(); }
function prevTrack() { loadTrack((current - 1 + TRACKS.length) % TRACKS.length); if (playing) audio.play(); }

audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = fmt(audio.currentTime);
  document.getElementById('time-dur').textContent = fmt(audio.duration);
});

function fmt(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m + ':' + String(sec).padStart(2,'0'); }

function seek(e) {
  const bar = document.getElementById('progress');
  const pct = (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth;
  audio.currentTime = pct * audio.duration;
}

function setVol(e) {
  const bar = e.currentTarget;
  const pct = (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth;
  audio.volume = Math.max(0, Math.min(1, pct));
  document.getElementById('vol-fill').style.width = (pct * 100) + '%';
}

function toggleMute() {
  audio.muted = !audio.muted;
  document.getElementById('vol-fill').style.width = audio.muted ? '0%' : (audio.volume * 100) + '%';
}

audio.volume = 0.5;

// Load Fender Bender on arrival
const fenderIdx = TRACKS.findIndex(t => t.title === 'Fender Bender');
if (fenderIdx >= 0) loadTrack(fenderIdx);

// Navigation — fetch page HTML, extract body content, inject into #content
async function nav(page) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');

  try {
    const resp = await fetch(page);
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Grab all stylesheets from the fetched page
    const styles = doc.querySelectorAll('style, link[rel="stylesheet"]');
    // Grab body content
    const body = doc.body.innerHTML;

    const container = document.getElementById('content');
    container.innerHTML = '';
    styles.forEach(s => container.appendChild(s.cloneNode(true)));
    container.innerHTML += body;

    // Strip duplicate navs and footers from injected pages
    container.querySelectorAll('nav, footer, .masthead-bar, .running-head').forEach(el => el.remove());

    // Add bottom padding so content doesn't hide behind player
    container.style.paddingBottom = '140px';

    // Execute any scripts in the fetched page (e.g., KaTeX)
    doc.querySelectorAll('script').forEach(s => {
      const ns = document.createElement('script');
      if (s.src) { ns.src = s.src; ns.defer = true; }
      else { ns.textContent = s.textContent; }
      container.appendChild(ns);
    });

    window.scrollTo(0, 0);
  } catch (e) {
    console.error('nav failed:', e);
  }
}

// Load landing page on start
nav('landing.html');
</script>
</body>
</html>
