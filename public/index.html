<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020204">
<title>mysubstrate.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pages/_mythos-meters.css">
<style>
:root {
  --signal-synth: #e8b858;
  --signal-synth-bright: #f5c970;
  --signal-synth-dim: rgba(232,184,88,0.12);
  --signal-machine: #4ec9d4;
  --ink-bright: #e8e3d4;
  --ink-soft: #b5b0a3;
  --ink-dim: #8a8574;
  --ink-faint: #4a4740;
  --stage-void: #020204;
  --rule: #242a33;
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%;
  background: #020204 !important;
  background-color: #020204 !important;
}
body {
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: #020204;
  background: var(--stage-void);
  color: var(--ink-bright);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  overflow: clip;
}

.portal {
  height: 100vh;
  height: 100dvh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 3;
  padding: 40px 24px;
  padding: 40px 24px env(safe-area-inset-bottom, 0);
}

/* ── PRIME RADIANT EMBLEM ─────────────────── */
.emblem {
  width: clamp(200px, 40vh, 380px);
  height: clamp(200px, 40vh, 380px);
  margin-bottom: 48px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.emblem svg {
  width: 100%;
  height: 100%;
  color: var(--signal-synth);
  filter: drop-shadow(0 0 40px rgba(232,184,88,0.15));
  transition: filter 200ms ease;
}

/* Breathing animation driven by --beat-bar-pulse when music plays,
   falls back to CSS keyframe breath when idle */
.emblem svg {
  animation: emblem-breath 6s ease-in-out infinite;
  transform: scale(calc(1 + 0.03 * var(--beat-bar-pulse, 0)));
  filter: drop-shadow(0 0 calc(40px + 30px * var(--beat-bar-pulse, 0)) rgba(232,184,88, calc(0.15 + 0.2 * var(--beat-bar-pulse, 0))));
}

@keyframes emblem-breath {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* ── TAGLINE ──────────────────────────────── */
.tagline {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 72;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.2rem, 2.8vw, 2.2rem);
  color: var(--ink-bright);
  text-align: center;
  margin-bottom: 56px;
  letter-spacing: -0.015em;
  line-height: 1.3;
  opacity: 0;
  animation: rise 1s ease-out 0.3s forwards;
}

/* ── DOORS ────────────────────────────────── */
.doors {
  display: flex;
  gap: 20px;
  align-items: center;
  opacity: 0;
  animation: rise 1s ease-out 0.6s forwards;
}

.door {
  padding: 16px 28px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  white-space: nowrap;
}

.door:hover {
  border-color: var(--signal-synth);
  color: var(--ink-bright);
  box-shadow: 0 0 24px rgba(232,184,88,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  transform: translateY(-1px);
}

.door.primary {
  border-color: rgba(232,184,88,0.25);
  color: var(--signal-synth);
}

.door.primary:hover {
  background: var(--signal-synth-dim);
  border-color: var(--signal-synth);
  color: var(--signal-synth-bright);
  box-shadow: 0 0 32px rgba(232,184,88,0.12);
}

/* ── FOOTER ───────────────────────────────── */
.credit {
  position: absolute;
  bottom: 32px;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-faint);
  opacity: 0;
  animation: rise 1s ease-out 1s forwards;
}

/* ── ANIMATIONS ───────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 600px) {
  .doors {
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 320px;
    gap: 12px;
  }
  .door {
    padding: 12px 20px;
    font-size: 10px;
  }
  .tagline {
    font-size: 1.3rem;
    margin-bottom: 32px;
  }
  .emblem {
    margin-bottom: 28px;
  }
  .email-row {
    max-width: 100%;
  }
  .portal {
    padding: 24px 20px;
  }
}

::selection {
  background: var(--signal-synth);
  color: var(--stage-void);
}
</style>
</head>
<body>

<div class="portal">

  <!-- PRIME RADIANT -->

    <svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="core" cx=".5" cy=".5" r=".5">
          <stop offset="0%" stop-color="#fff2c8" stop-opacity=".9"/>

          <stop offset="50%" stop-color="#d9a441" stop-opacity=".08"/>

          <stop offset="0%" stop-color="#e8b858" stop-opacity=".06"/>

        </radialGradient>
      </defs>
      <circle cx="340" cy="340" r="340" fill="url(#halo)"/>
      <circle cx="340" cy="340" r="200" fill="url(#core)" opacity=".45"/>
      <circle cx="340" cy="340" r="100" fill="url(#core)" opacity=".75"/>
      <circle cx="340" cy="340" r="38" fill="url(#core)" opacity=".9"/>
      <g transform="translate(270 280) scale(2)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.2" opacity=".95"/>
        <line x1="35" y1="2" x2="35" y2="22" stroke-width=".8" opacity=".65"/>
        <line x1="10" y1="16" x2="35" y2="22" stroke-width=".8" opacity=".65"/>
        <line x1="60" y1="16" x2="35" y2="22" stroke-width=".8" opacity=".65"/>
        <line x1="35" y1="58" x2="35" y2="38" stroke-width=".8" opacity=".55"/>
        <line x1="10" y1="44" x2="35" y2="38" stroke-width=".8" opacity=".55"/>
        <line x1="60" y1="44" x2="35" y2="38" stroke-width=".8" opacity=".55"/>
        <line x1="35" y1="22" x2="35" y2="38" stroke-width=".6" opacity=".45"/>
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".8" opacity=".85" fill="currentColor" fill-opacity=".1"/>
        <line x1="35" y1="16" x2="35" y2="44" stroke-width=".5" opacity=".5"/>
        <line x1="23" y1="23" x2="47" y2="37" stroke-width=".5" opacity=".4"/>
        <line x1="47" y1="23" x2="23" y2="37" stroke-width=".5" opacity=".4"/>
      </g>
      <circle cx="340" cy="340" r="3" fill="#ffffff"/>
      <circle cx="340" cy="340" r="6" fill="currentColor" opacity=".85"/>
    </svg>
  </div>

  <!-- TAGLINE -->
  <p class="tagline">Free your Mind.</p>

  <!-- DOORS -->
  <div class="doors">
    <a class="door primary" href="isaac/">Ask Isaac <span style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px">&rarr;</span></a>
    <a class="door" href="mythchat/">MythChat <span style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px">&rarr;</span></a>
    <a class="door" href="pages/waitlist.html">Join the Waitlist <span style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px">&rarr;</span></a>
  </div>

  <!-- CREDIT -->
  <div class="credit">HORIZ3N &middot; 2026 &middot; Edition I</div>

</div>

<script>
(function() {
  // Navigation for in-iframe links
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[data-mythos-link]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('#')) return;
    if (window.parent && window.parent !== window) {
      e.preventDefault();
      window.parent.postMessage({ type: 'mythos:nav', href: href }, '*');
    }
  });

  // Skin sync
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:skin' || !d.palette) return;
    var root = document.documentElement;
    for (var key in d.palette) {
      root.style.setProperty(key, d.palette[key]);
    }
  });

  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'mythos:skin:subscribe' }, '*');
  }
})();
</script>
<script src="pages/_mythos-page.js"></script>
</body>
</html>
