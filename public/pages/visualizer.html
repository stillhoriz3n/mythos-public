<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORIZ3N — Lyrics + Visuals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --signal-machine:#4ec9d4;--signal-synth:#e8b858;
    --ink-bright:#e8e3d4;--ink-dim:#8a8574;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:transparent;overflow:hidden;font-family:'JetBrains Mono',monospace;color:var(--ink-bright);-webkit-font-smoothing:antialiased}
</style>
</head>
<body>

<script>
  // Skin sync — receive palette from shell
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:skin' || !d.palette) return;
    var root = document.documentElement;
    for (var key in d.palette) {
      root.style.setProperty(key, d.palette[key]);
    }
  });

  // Request current skin from shell on load
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'mythos:skin:subscribe' }, '*');
  }
</script>
</body>
</html>
