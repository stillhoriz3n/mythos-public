<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORIZ3N — Signal Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800&family=Fraunces:ital,opsz,wght@1,9..144,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --signal-machine:#4ec9d4;--signal-synth:#e8b858;
    --ink-bright:#e8e3d4;--ink-dim:#8a8574;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:transparent;overflow:hidden;font-family:'JetBrains Mono',monospace;color:var(--ink-bright);-webkit-font-smoothing:antialiased}

  .ui{
    position:absolute;inset:0;
    bottom:90px; /* clear the shell player */
    z-index:10;pointer-events:none;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:28px 36px;
  }
  .ui-top{display:flex;justify-content:space-between;align-items:flex-start}
  .ui-bottom{display:flex;justify-content:space-between;align-items:flex-end}
  .title-block h1{
    font-family:'Archivo',sans-serif;font-weight:800;
    font-size:clamp(28px,6vw,72px);line-height:1.0;letter-spacing:-.02em;
    color:var(--signal-synth);pointer-events:auto;
  }
  .title-block h1 .machine{color:var(--signal-machine)}
  .title-block h1 .amp{
    font-family:'Fraunces',serif;font-variation-settings:"opsz" 144;
    font-weight:300;font-style:italic;font-size:1.3em;color:var(--signal-synth);
  }
  .credit{text-align:right}
  .credit .primary{font-size:16px;font-weight:600;letter-spacing:.18em;color:var(--signal-synth)}
  .credit .secondary{font-size:10px;letter-spacing:.12em;color:var(--ink-dim);margin-top:4px}
  .track-info{pointer-events:auto}
  .track-info .now-playing{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--signal-synth);margin-bottom:8px;opacity:.7}
  .track-info .track-name{font-family:'Archivo',sans-serif;font-size:22px;font-weight:700;color:var(--ink-bright);letter-spacing:.01em}
  .track-info .album-name{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px;color:var(--ink-dim);margin-top:4px}
  .emblem{opacity:.6}

  @media(max-width:880px){
    .ui{padding:20px 24px;bottom:96px}
    .title-block h1{font-size:clamp(24px,5vw,48px)}
    .track-info .track-name{font-size:18px}
    .credit .primary{font-size:13px;letter-spacing:.14em}
    .credit .secondary{font-size:9px}
  }
  @media(max-width:480px){
    .ui{padding:14px 16px;bottom:78px}
    .ui-bottom{flex-direction:column-reverse;align-items:flex-start;gap:16px}
    .title-block h1{font-size:24px}
    .track-info .now-playing{font-size:8px;margin-bottom:4px}
    .track-info .track-name{font-size:14px}
    .track-info .album-name{font-size:12px}
    .credit .primary{font-size:11px}
    .credit .secondary{font-size:8px}
    .emblem{width:24px;height:20px}
  }
</style>
</head>
<body>

<div class="ui">
  <div class="ui-top">
    <svg class="emblem" viewBox="0 0 70 60" width="32" height="28" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="var(--signal-synth, #e8b858)" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.4" opacity=".9"/>
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".9" opacity=".8" fill="var(--signal-synth, #e8b858)" fill-opacity=".1"/>
        <circle cx="35" cy="30" r="1.8" fill="var(--signal-synth, #ffe6a0)" opacity=".95"/>
      </g>
    </svg>
    <div class="credit">
      <div class="primary">HORIZ3N</div>
      <div class="secondary">Prime Radiant &middot; 2026</div>
    </div>
  </div>
  <div class="ui-bottom">
    <div class="track-info">
      <div class="now-playing">&#10022; now playing</div>
      <div class="track-name" id="viz-track">&mdash;</div>
      <div class="album-name" id="viz-album">&mdash;</div>
    </div>
    <div class="title-block" id="viz-title-block">
      <h1 id="viz-title"><span class="machine">ROBOTS</span><br><span class="amp">&amp;</span> REMIXES</h1>
    </div>
  </div>
</div>

<script>
  var ALBUM_TITLES = {
    'sh': '<span class="machine">still</span><br>HORIZ<span class="amp">3</span>N',
    'rr': '<span class="machine">ROBOTS</span><br><span class="amp">&amp;</span> REMIXES'
  };
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:audio') return;
    if (d.track) {
      document.getElementById('viz-track').textContent = d.track.title || '\u2014';
      document.getElementById('viz-album').textContent = d.track.album || '\u2014';
      var titleHtml = ALBUM_TITLES[d.track.cover];
      if (titleHtml) document.getElementById('viz-title').innerHTML = titleHtml;
    }
  });
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'mythos:audio:subscribe' }, '*');
  }

  // Skin sync — receive palette from shell
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:skin' || !d.palette) return;
    var root = document.documentElement;
    for (var key in d.palette) {
      root.style.setProperty(key, d.palette[key]);
    }
  });

  // Request current skin from shell on load
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'mythos:skin:subscribe' }, '*');
  }
</script>
</body>
</html>
