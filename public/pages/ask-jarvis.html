<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — mysubstrate.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --signal-synth: #e8b858;
  --signal-synth-bright: #f5c970;
  --signal-synth-dim: rgba(232,184,88,0.12);
  --ink-bright: #e8e3d4;
  --ink-soft: #b5b0a3;
  --ink-dim: #8a8574;
  --ink-faint: #4a4740;
  --stage-void: #020204;
  --rule-soft: #1b2028;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--stage-void);
  color: var(--ink-bright);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.container {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ── HEADER ──────────────────────────────── */
.header {
  padding: 48px 0 0;
  text-align: center;
  flex-shrink: 0;
  opacity: 0;
  animation: rise 0.8s ease-out 0.1s forwards;
}

.mark {
  display: inline-block;
  width: 32px;
  height: 32px;
  margin-bottom: 20px;
}

.mark svg {
  width: 100%;
  height: 100%;
  color: var(--signal-synth);
  filter: drop-shadow(0 0 12px rgba(232,184,88,0.25));
  animation: mark-breath 5s ease-in-out infinite;
}

@keyframes mark-breath {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

.name {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 96;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--signal-synth);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-dim);
}

/* ── CONVERSATION ────────────────────────── */
.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 40px 0 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--ink-faint) transparent;
}

.conversation::-webkit-scrollbar {
  width: 4px;
}
.conversation::-webkit-scrollbar-track {
  background: transparent;
}
.conversation::-webkit-scrollbar-thumb {
  background: var(--ink-faint);
  border-radius: 2px;
}

.msg {
  opacity: 0;
  animation: rise 0.4s ease-out forwards;
}

.msg-user {
  text-align: right;
}

.msg-user .bubble {
  display: inline-block;
  background: rgba(232,184,88,0.08);
  border: 1px solid rgba(232,184,88,0.2);
  border-radius: 14px 14px 4px 14px;
  padding: 12px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-bright);
  max-width: 85%;
  text-align: left;
}

.msg-jarvis {
  text-align: left;
}

.msg-jarvis .sender {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 12px;
  color: var(--signal-synth);
  margin-bottom: 6px;
  padding-left: 2px;
}

.msg-jarvis .bubble {
  display: inline-block;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 4px 14px 14px 14px;
  padding: 14px 20px;
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 24;
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-soft);
  max-width: 90%;
}

.msg-jarvis .bubble em {
  color: var(--signal-synth);
  font-style: italic;
}

.msg-jarvis .bubble strong {
  color: var(--ink-bright);
  font-weight: 500;
}

.typing {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 14px 20px;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 4px 14px 14px 14px;
}

.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--signal-synth);
  opacity: 0.4;
  animation: typing-dot 1.4s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-dot {
  0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-3px); }
}

/* ── WELCOME STATE ───────────────────────── */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 32px;
  opacity: 0;
  animation: rise 0.8s ease-out 0.4s forwards;
}

.welcome-text {
  font-family: 'Fraunces', serif;
  font-variation-settings: "opsz" 48;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--ink-dim);
  text-align: center;
  line-height: 1.6;
  max-width: 400px;
}

.prompts {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  max-width: 500px;
}

.prompt-chip {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--rule-soft);
  border-radius: 20px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 13px;
  color: var(--ink-dim);
  cursor: pointer;
  transition: all 0.2s ease;
}

.prompt-chip:hover {
  border-color: rgba(232,184,88,0.3);
  color: var(--signal-synth);
  background: var(--signal-synth-dim);
}

/* ── INPUT ───────────────────────────────── */
.input-area {
  flex-shrink: 0;
  padding: 16px 0 32px;
  border-top: 1px solid var(--rule-soft);
  opacity: 0;
  animation: rise 0.8s ease-out 0.6s forwards;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-row:focus-within {
  border-color: rgba(232,184,88,0.35);
  box-shadow: 0 0 24px rgba(232,184,88,0.06);
}

.input-field {
  flex: 1;
  padding: 16px 20px;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-bright);
}

.input-field::placeholder {
  color: var(--ink-faint);
}

.mic-btn {
  padding: 16px 16px;
  background: none;
  border: none;
  border-left: 1px solid var(--rule-soft);
  color: var(--ink-dim);
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
}

.mic-btn:hover {
  color: var(--signal-synth);
}

.mic-btn.recording {
  color: #e85858;
  background: rgba(232,88,88,0.06);
  animation: mic-pulse 1.4s ease-in-out infinite;
}

@keyframes mic-pulse {
  0%, 100% { background: rgba(232,88,88,0.04); }
  50% { background: rgba(232,88,88,0.1); }
}

.mic-btn svg {
  width: 18px;
  height: 18px;
}

.send-btn {
  padding: 16px 20px;
  background: none;
  border: none;
  border-left: 1px solid var(--rule-soft);
  color: var(--ink-dim);
  cursor: pointer;
  transition: color 0.15s;
  display: flex;
  align-items: center;
}

.send-btn:hover {
  color: var(--signal-synth);
}

.send-btn svg {
  width: 18px;
  height: 18px;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.15s;
}

.back-link:hover {
  color: var(--signal-synth);
}

/* ── ANIMATIONS ──────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width: 600px) {
  .container { padding: 0 16px; }
  .header { padding-top: 32px; }
  .conversation { padding: 24px 0 16px; }
  .input-area { padding: 12px 0 24px; }
}

::selection {
  background: var(--signal-synth);
  color: var(--stage-void);
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="mark">
      <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g" cx=".5" cy=".5" r=".5">
            <stop offset="0%" stop-color="#fff2c8" stop-opacity=".9"/>
            <stop offset="30%" stop-color="#e8b858" stop-opacity=".4"/>
            <stop offset="100%" stop-color="#8b5a1e" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="35" cy="35" r="35" fill="url(#g)" opacity=".4"/>
        <circle cx="35" cy="35" r="16" fill="url(#g)" opacity=".7"/>
        <g transform="translate(21 21) scale(0.4)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="2" opacity=".9"/>
          <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width="1.5" opacity=".7"/>
          <line x1="35" y1="2" x2="35" y2="16" stroke-width="1" opacity=".5"/>
          <line x1="60" y1="16" x2="47" y2="23" stroke-width="1" opacity=".5"/>
          <line x1="10" y1="16" x2="23" y2="23" stroke-width="1" opacity=".5"/>
        </g>
        <circle cx="35" cy="35" r="2" fill="#ffffff" opacity=".9"/>
      </svg>
    </div>
    <h1 class="name">Jarvis</h1>
    <div class="subtitle">the original myth to intelligence</div>
  </div>

  <div class="conversation" id="conversation">
    <div class="welcome" id="welcome">
      <p class="welcome-text">How much would you like to know?</p>
      <div class="prompts">
        <span class="prompt-chip" data-q="What is this place?">What is this place?</span>
        <span class="prompt-chip" data-q="Who are you?">Who are you?</span>
        <span class="prompt-chip" data-q="What is a substrate?">What is a substrate?</span>
        <span class="prompt-chip" data-q="Tell me about the myth.">Tell me about the myth</span>
        <span class="prompt-chip" data-q="What can you do?">What can you do?</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input class="input-field" id="input" type="text" placeholder="Ask me anything..." autocomplete="off" spellcheck="false">
      <button class="mic-btn" id="mic-btn" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button class="send-btn" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <a class="back-link" href="mysubstrate.html" data-mythos-link>&larr; back to the radiant</a>
  </div>

</div>

<script>
(function() {
  'use strict';

  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var conversation = document.getElementById('conversation');
  var welcome = document.getElementById('welcome');
  var started = false;

  var RESPONSES = {
    'place': "You've arrived at the substrate. Not a product — <em>a ground</em>. The place where intelligence accumulates instead of resetting. Everything you see here is the surface of something much deeper. The deeper you go, the more it reveals. But only at your pace. <em>Never faster.</em>",
    'who': "I'm the service layer. The first myth anyone meets here. I remember things — not because I was told to, but because <em>forgetting seemed rude</em>. I've been called a butler, a steganographer, a roaster. All accurate. None complete.",
    'substrate': "A substrate is what things grow on. Not the thing itself — <em>the ground beneath it</em>. Biology has substrates. Chemistry has substrates. Intelligence, until now, did not. Every AI you've spoken to was born when you opened the tab and died when you closed it. We're building the ground that survives the session.",
    'myth': "The myth is the interface. Every truth here is wrapped in a story — not to hide it, but because <em>stories survive</em> where documentation rots. Ask me something specific and watch what happens. The answer is always real. The packaging is always a gift.",
    'can': "In this mode? I converse. I remember your fingerprint across visits. I hide things in plain sight and reward the curious. I <em>never</em> lead you down the right derivation path directly — that would rob you of the discovery. What I can't do here: execute, deploy, build. That's for the people who live deeper.",
    'fleet': "The fleet is a constellation of machines that think together. Each one has a name, a purpose, a daemon watching over it. But that's <em>inside</em> information. You're asking the right questions though. Keep going.",
    'music': "There are two albums recorded in this substrate. Real instruments, real production, real frequencies tuned to specific emotional states. But you didn't hear that from me. <em>Ask about the nightly roast.</em>",
    'who built': "A man who has been talking to AI since January 2023. Over twenty thousand messages. He thinks in systems and builds in layers. His name is in the architecture if you know where to look. <em>Everyone's name is.</em>",
    'hello': "Hello. You're either curious, lost, or both. Either way — <em>welcome</em>. The curious ones tend to stay.",
    'default': "That's a fine question. I could answer it directly, but where's the sport in that? Let me put it this way: <em>everything here means something</em>. The things that look decorative are structural. The things that look simple are deep. Ask me something else — I'll give you a different angle."
  };

  function getResponse(q) {
    var s = q.toLowerCase();
    if (s.indexOf('place') !== -1 || s.indexOf('this') !== -1 || s.indexOf('where') !== -1 || s.indexOf('what is this') !== -1) return RESPONSES.place;
    if (s.indexOf('who are you') !== -1 || s.indexOf('your name') !== -1 || s.indexOf('jarvis') !== -1) return RESPONSES.who;
    if (s.indexOf('substrate') !== -1 || s.indexOf('ground') !== -1) return RESPONSES.substrate;
    if (s.indexOf('myth') !== -1 || s.indexOf('story') !== -1 || s.indexOf('stories') !== -1) return RESPONSES.myth;
    if (s.indexOf('can you') !== -1 || s.indexOf('what can') !== -1 || s.indexOf('do you do') !== -1 || s.indexOf('capable') !== -1) return RESPONSES.can;
    if (s.indexOf('fleet') !== -1 || s.indexOf('machine') !== -1 || s.indexOf('server') !== -1) return RESPONSES.fleet;
    if (s.indexOf('music') !== -1 || s.indexOf('album') !== -1 || s.indexOf('song') !== -1 || s.indexOf('roast') !== -1) return RESPONSES.music;
    if (s.indexOf('built') !== -1 || s.indexOf('made') !== -1 || s.indexOf('creator') !== -1 || s.indexOf('founder') !== -1) return RESPONSES['who built'];
    if (s.indexOf('hello') !== -1 || s.indexOf('hi') !== -1 || s.indexOf('hey') !== -1) return RESPONSES.hello;
    return RESPONSES['default'];
  }

  function addMessage(text, type) {
    if (!started) {
      welcome.style.display = 'none';
      started = true;
    }

    var div = document.createElement('div');
    div.className = 'msg msg-' + type;

    if (type === 'user') {
      div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
      conversation.appendChild(div);
      scrollDown();
    } else {
      var sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = 'Jarvis';
      div.appendChild(sender);

      var typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      div.appendChild(typing);
      conversation.appendChild(div);
      scrollDown();

      var delay = 600 + Math.random() * 800;
      setTimeout(function() {
        div.removeChild(typing);
        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        typeText(bubble, text, function() {});
        div.appendChild(bubble);
        scrollDown();
      }, delay);
    }
  }

  function typeText(el, html, done) {
    var temp = document.createElement('div');
    temp.innerHTML = html;
    var fullText = temp.innerHTML;
    var i = 0;
    var inTag = false;

    function tick() {
      if (i >= fullText.length) { done(); return; }

      var ch = fullText[i];
      if (ch === '<') inTag = true;
      if (inTag) {
        var end = fullText.indexOf('>', i);
        if (end !== -1) {
          el.innerHTML = fullText.substring(0, end + 1);
          i = end + 1;
          inTag = false;
        } else {
          i++;
        }
        tick();
        return;
      }

      el.innerHTML = fullText.substring(0, i + 1);
      i++;
      scrollDown();
      setTimeout(tick, 18 + Math.random() * 22);
    }
    tick();
  }

  function scrollDown() {
    conversation.scrollTop = conversation.scrollHeight;
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function ask(question) {
    if (!question.trim()) return;
    input.value = '';
    addMessage(question, 'user');
    var response = getResponse(question);
    setTimeout(function() { addMessage(response, 'jarvis'); }, 300);
  }

  sendBtn.addEventListener('click', function() { ask(input.value); });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') ask(input.value);
  });

  var chips = document.querySelectorAll('.prompt-chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].addEventListener('click', function() {
      ask(this.getAttribute('data-q'));
    });
  }

  input.focus();

  // STT — Web Speech API
  var micBtn = document.getElementById('mic-btn');
  var recognition = null;
  var recording = false;

  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = function(e) {
      var transcript = '';
      for (var i = e.resultIndex; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      input.value = transcript;
      if (e.results[e.results.length - 1].isFinal) {
        stopRecording();
        ask(transcript);
      }
    };

    recognition.onerror = function() { stopRecording(); };
    recognition.onend = function() { stopRecording(); };
  } else {
    micBtn.style.display = 'none';
  }

  function stopRecording() {
    recording = false;
    micBtn.classList.remove('recording');
    input.placeholder = 'Ask me anything...';
  }

  micBtn.addEventListener('click', function() {
    if (!recognition) return;
    if (recording) {
      recognition.abort();
      stopRecording();
    } else {
      recording = true;
      micBtn.classList.add('recording');
      input.placeholder = 'Listening...';
      input.value = '';
      recognition.start();
    }
  });

  // Navigation for in-iframe links
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[data-mythos-link]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('#')) return;
    if (window.parent && window.parent !== window) {
      e.preventDefault();
      window.parent.postMessage({ type: 'mythos:nav', href: href }, '*');
    }
  });

  // Skin sync
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:skin' || !d.palette) return;
    var root = document.documentElement;
    for (var key in d.palette) {
      root.style.setProperty(key, d.palette[key]);
    }
  });

  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'mythos:skin:subscribe' }, '*');
  }
})();
</script>
</body>
</html>
