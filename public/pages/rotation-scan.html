<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Radiant — Rotation Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stage-void:#020204; --stage-deep:#08070d; --stage-mid:#14121c; --stage-center:#1f1a2a;
    --panel:#0c0b12; --rule:#242a33; --rule-soft:#1b2028;
    --signal-synth:#e8b858; --signal-bright:#f5c970; --signal-machine:#4ec9d4;
    --ink-bright:#e8e3d4; --ink-soft:#b5b0a3; --ink-dim:#8a8574; --ink-faint:#4a4740;
    --core-white:#ffffff; --core-halo:#fff2c8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Archivo',sans-serif;
    color:var(--ink-bright);
    background:
      radial-gradient(ellipse 1600px 900px at 50% 40%,
        var(--stage-center) 0%, var(--stage-mid) 35%,
        var(--stage-deep) 70%, var(--stage-void) 100%),
      var(--stage-void);
    overflow:hidden;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;position:relative;
  }

  .shell{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:20px;max-width:760px;width:100%}

  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.32em;
    text-transform:uppercase;color:var(--signal-synth);
    display:inline-flex;align-items:center;gap:14px;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";width:42px;height:1px;background:var(--signal-synth);opacity:0.5;
  }

  /* the stage */
  .stage{
    position:relative;width:min(540px,88vw);aspect-ratio:1;
    display:flex;align-items:center;justify-content:center;
  }
  .stage::before{
    content:"";position:absolute;inset:0;
    background-image:
      linear-gradient(color-mix(in srgb,var(--ink-bright) 3%,transparent) 1px,transparent 1px),
      linear-gradient(90deg,color-mix(in srgb,var(--ink-bright) 3%,transparent) 1px,transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse at center,black 45%,transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse at center,black 45%,transparent 80%);
    pointer-events:none;opacity:0.55;
  }

  .tick{position:absolute;width:22px;height:22px;border:1px solid var(--ink-faint);opacity:0.55;pointer-events:none}
  .tick.tl{top:0;left:0;border-right:none;border-bottom:none}
  .tick.tr{top:0;right:0;border-left:none;border-bottom:none}
  .tick.bl{bottom:0;left:0;border-right:none;border-top:none}
  .tick.br{bottom:0;right:0;border-left:none;border-top:none}

  .emblem-svg{
    width:78%;height:78%;
    filter: drop-shadow(0 0 40px color-mix(in srgb,var(--signal-synth) 22%,transparent));
    position:relative;z-index:2;
  }
  /* the emblem group rotates inside the svg */
  .rotator{
    transform-origin:35px 30px;
    transition:transform 1.1s cubic-bezier(.65,.05,.35,1);
  }

  /* angle readout in top-right of stage */
  .angle-readout{
    position:absolute;top:-34px;right:-2px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--ink-dim);
    display:inline-flex;gap:10px;align-items:center;
  }
  .angle-readout .val{color:var(--signal-synth);font-weight:600;min-width:44px;text-align:right}

  /* direction-of-read label on left of stage */
  .read-axis{
    position:absolute;top:-34px;left:-2px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .read-axis .ax{color:var(--signal-synth)}

  /* LABEL */
  .label-block{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    min-height:120px;max-width:560px;text-align:center;padding:0 12px;
  }
  .label-idx{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.3em;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .label-idx .cur{color:var(--signal-synth);font-weight:600}
  .label-name{
    font-family:'Archivo',sans-serif;font-weight:800;
    font-size:clamp(28px,4vw,40px);line-height:1;letter-spacing:-0.02em;
    color:var(--ink-bright);margin-top:4px;
  }
  .label-name .fraunces{
    font-family:'Fraunces',serif;font-style:italic;font-weight:300;
    color:var(--signal-synth);font-variation-settings:"opsz" 144;
  }
  .label-desc{
    font-family:'Fraunces',serif;font-style:italic;font-weight:400;
    font-size:16px;line-height:1.5;color:var(--ink-soft);max-width:520px;
  }

  /* controls */
  .controls{display:flex;align-items:center;gap:14px;margin-top:6px}
  .ctrl-btn{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;
    text-transform:uppercase;padding:10px 16px;background:transparent;
    color:var(--ink-bright);border:1px solid var(--rule);border-radius:2px;
    cursor:pointer;transition:all 0.15s;
    display:inline-flex;align-items:center;gap:8px;min-width:48px;justify-content:center;
  }
  .ctrl-btn:hover{border-color:var(--signal-synth);color:var(--signal-synth)}
  .ctrl-btn.primary{
    background:var(--signal-synth);color:var(--stage-void);border-color:var(--signal-synth);
    font-weight:600;min-width:120px;
  }
  .ctrl-btn.primary:hover{background:var(--signal-bright);border-color:var(--signal-bright);color:var(--stage-void)}

  /* pager */
  .pager{display:flex;gap:10px;align-items:center}
  .pager .dot{
    width:7px;height:7px;border-radius:50%;background:var(--ink-faint);cursor:pointer;
    transition:background 0.25s,transform 0.25s,box-shadow 0.25s;
  }
  .pager .dot:hover{background:var(--ink-dim)}
  .pager .dot.active{
    background:var(--signal-synth);transform:scale(1.35);
    box-shadow:0 0 10px color-mix(in srgb,var(--signal-synth) 70%,transparent);
  }

  /* highlighted strokes */
  .m-stroke{
    stroke:var(--core-halo);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
    fill:none;opacity:0;transition:opacity 0.45s ease;
    filter:drop-shadow(0 0 2.5px var(--core-halo));
  }
  .m-stroke.on{opacity:1}
  .m-vertex{
    fill:var(--core-halo);opacity:0;transition:opacity 0.45s ease;
    filter:drop-shadow(0 0 2px var(--core-halo));
  }
  .m-vertex.on{opacity:1}
  .lattice-bg{transition:opacity 0.5s ease}
  .lattice-bg.dim{opacity:0.3}

  @keyframes corepulse{0%,100%{opacity:1}50%{opacity:0.85}}
  .core{animation:corepulse 4s ease-in-out infinite}

  footer{
    position:fixed;bottom:16px;left:0;right:0;text-align:center;
    font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--ink-faint);z-index:1;
  }
  footer .dim{color:var(--ink-faint)}
  footer .bright{color:var(--ink-dim)}
  footer .glyph{color:var(--signal-synth)}

  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .shell{animation:fadein 1s ease-out}
</style>
</head>
<body>

<div class="shell">
  <div class="eyebrow">Prime Radiant · Rotation Scan</div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <span class="tick tl"></span><span class="tick tr"></span>
    <span class="tick bl"></span><span class="tick br"></span>
    <div class="read-axis">READS AT <span class="ax" id="axis-val">0°</span></div>
    <div class="angle-readout">ROT <span class="val" id="rot-val">0°</span></div>

    <svg class="emblem-svg" viewBox="0 0 70 60" xmlns="http://www.w3.org/2000/svg">
      <g class="rotator" id="rotator">

        <!-- LATTICE (canonical, full) -->
        <g class="lattice-bg" id="lattice"
           fill="none" stroke="var(--signal-synth)"
           stroke-linecap="round" stroke-linejoin="round">
          <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.4" opacity="0.95"/>
          <line x1="35" y1="2"  x2="35" y2="22" stroke-width="0.9" opacity="0.75"/>
          <line x1="10" y1="16" x2="35" y2="22" stroke-width="0.9" opacity="0.75"/>
          <line x1="60" y1="16" x2="35" y2="22" stroke-width="0.9" opacity="0.75"/>
          <line x1="35" y1="58" x2="35" y2="38" stroke-width="0.9" opacity="0.65"/>
          <line x1="10" y1="44" x2="35" y2="38" stroke-width="0.9" opacity="0.65"/>
          <line x1="60" y1="44" x2="35" y2="38" stroke-width="0.9" opacity="0.65"/>
          <line x1="35" y1="22" x2="35" y2="38" stroke-width="0.7" opacity="0.5"/>
          <polygon points="35,16 47,23 47,37 35,44 23,37 23,23"
            stroke-width="0.9" opacity="0.85"
            fill="var(--signal-synth)" fill-opacity="0.1"/>
          <line x1="35" y1="16" x2="35" y2="44" stroke-width="0.55" opacity="0.55"/>
          <line x1="23" y1="23" x2="47" y2="37" stroke-width="0.55" opacity="0.45"/>
          <line x1="47" y1="23" x2="23" y2="37" stroke-width="0.55" opacity="0.45"/>
          <line x1="35" y1="2"  x2="35" y2="16" stroke-width="0.55" opacity="0.55"/>
          <line x1="60" y1="16" x2="47" y2="23" stroke-width="0.55" opacity="0.55"/>
          <line x1="60" y1="44" x2="47" y2="37" stroke-width="0.55" opacity="0.55"/>
          <line x1="35" y1="58" x2="35" y2="44" stroke-width="0.55" opacity="0.55"/>
          <line x1="10" y1="44" x2="23" y2="37" stroke-width="0.55" opacity="0.55"/>
          <line x1="10" y1="16" x2="23" y2="23" stroke-width="0.55" opacity="0.55"/>
        </g>

        <!-- HIGHLIGHT GROUPS — each letter at its native orientation in emblem-space.
             The whole <g class="rotator"> rotates; highlights rotate with it so they
             track the correct geometry, while the viewer sees the letter re-frame. -->

        <!-- L1 · M (deep, upright) -->
        <g class="m-group" data-m="M">
          <line class="m-stroke" x1="10" y1="16" x2="10" y2="44"/>
          <line class="m-stroke" x1="60" y1="16" x2="60" y2="44"/>
          <line class="m-stroke" x1="10" y1="16" x2="35" y2="38"/>
          <line class="m-stroke" x1="35" y1="38" x2="60" y2="16"/>
          <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
          <circle class="m-vertex" cx="35" cy="38" r="1.4"/>
        </g>

        <!-- L2 · W (mirror of M — upside-down M = W; uses upper hub as peak) -->
        <g class="m-group" data-m="W">
          <line class="m-stroke" x1="10" y1="44" x2="10" y2="16"/>
          <line class="m-stroke" x1="60" y1="44" x2="60" y2="16"/>
          <line class="m-stroke" x1="10" y1="44" x2="35" y2="22"/>
          <line class="m-stroke" x1="35" y1="22" x2="60" y2="44"/>
          <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
          <circle class="m-vertex" cx="35" cy="22" r="1.4"/>
        </g>

        <!-- L3 · V (just the two diagonals meeting at the bottom hub) -->
        <g class="m-group" data-m="V">
          <line class="m-stroke" x1="10" y1="16" x2="35" y2="38"/>
          <line class="m-stroke" x1="35" y1="38" x2="60" y2="16"/>
          <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="35" cy="38" r="1.4"/>
        </g>

        <!-- L4 · A (two outer diagonals meeting at top vertex, crossbar through core) -->
        <g class="m-group" data-m="A">
          <line class="m-stroke" x1="35" y1="2" x2="10" y2="44"/>
          <line class="m-stroke" x1="35" y1="2" x2="60" y2="44"/>
          <line class="m-stroke" x1="22.5" y1="27" x2="47.5" y2="27"/>
          <circle class="m-vertex" cx="35" cy="2"  r="1.4"/>
          <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
        </g>

        <!-- L5 · X (inner cuboctahedron's diagonals crossing at the core) -->
        <g class="m-group" data-m="X">
          <line class="m-stroke" x1="23" y1="23" x2="47" y2="37"/>
          <line class="m-stroke" x1="47" y1="23" x2="23" y2="37"/>
          <circle class="m-vertex" cx="23" cy="23" r="1.1"/>
          <circle class="m-vertex" cx="47" cy="23" r="1.1"/>
          <circle class="m-vertex" cx="23" cy="37" r="1.1"/>
          <circle class="m-vertex" cx="47" cy="37" r="1.1"/>
        </g>

        <!-- L6 · Y (two upper arms meeting at top hub, trunk down through core to bottom hub) -->
        <g class="m-group" data-m="Y">
          <line class="m-stroke" x1="10" y1="16" x2="35" y2="22"/>
          <line class="m-stroke" x1="60" y1="16" x2="35" y2="22"/>
          <line class="m-stroke" x1="35" y1="22" x2="35" y2="44"/>
          <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="35" cy="22" r="1.4"/>
          <circle class="m-vertex" cx="35" cy="44" r="1.2"/>
        </g>

        <!-- L7 · K (left leg + two diagonals from mid-leg outward to right vertices) -->
        <g class="m-group" data-m="K">
          <line class="m-stroke" x1="10" y1="16" x2="10" y2="44"/>
          <line class="m-stroke" x1="10" y1="30" x2="35" y2="16"/>
          <line class="m-stroke" x1="10" y1="30" x2="35" y2="44"/>
          <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
          <circle class="m-vertex" cx="10" cy="30" r="1.3"/>
          <circle class="m-vertex" cx="35" cy="16" r="1.2"/>
          <circle class="m-vertex" cx="35" cy="44" r="1.2"/>
        </g>

        <!-- L8 · Z (top edge + diagonal + bottom edge — reads as Z across the inner shell) -->
        <g class="m-group" data-m="Z">
          <line class="m-stroke" x1="23" y1="23" x2="47" y2="23"/>
          <line class="m-stroke" x1="47" y1="23" x2="23" y2="37"/>
          <line class="m-stroke" x1="23" y1="37" x2="47" y2="37"/>
          <circle class="m-vertex" cx="23" cy="23" r="1.1"/>
          <circle class="m-vertex" cx="47" cy="23" r="1.1"/>
          <circle class="m-vertex" cx="23" cy="37" r="1.1"/>
          <circle class="m-vertex" cx="47" cy="37" r="1.1"/>
        </g>

        <!-- CORE -->
        <circle class="core" cx="35" cy="30" r="1.8" fill="var(--core-halo)" opacity="0.98"/>
        <circle cx="35" cy="30" r="4.5" fill="none" stroke="var(--core-halo)"
          stroke-width="0.45" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <!-- LABEL -->
  <div class="label-block">
    <div class="label-idx">
      L<span class="cur" id="l-idx">01</span> <span style="color:var(--ink-faint)">of</span> <span id="l-total">08</span>
      <span style="color:var(--ink-faint)">·</span>
      <span id="l-code">letter M · upright</span>
    </div>
    <h2 class="label-name" id="l-name">The <span class="fraunces">M</span></h2>
    <p class="label-desc" id="l-desc">
      The original find. Valley at the bottom hub, singularity in the cradle.
    </p>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="prev" aria-label="Previous">←</button>
    <button class="ctrl-btn primary" id="toggle">◈ Cycle</button>
    <button class="ctrl-btn" id="next" aria-label="Next">→</button>
  </div>

  <div class="pager" id="pager"></div>
</div>

<footer>
  <span class="glyph">✦</span>
  <span class="bright">Prime Radiant</span>
  <span class="dim">·</span>
  <span>the alphabet in the lattice</span>
</footer>

<script>
(() => {
  /* Each entry: which letter, rotation of the whole emblem (degrees clockwise),
     plus the descriptive metadata. The emblem rotates; the highlighted letter
     rotates with it, meaning from the viewer's frame the letter APPEARS upright
     only at the correct rotation. */
  const LETTERS = [
    { m:'M', rot:0,   name:['The ','M'],
      code:"letter M · 0° rotation",
      desc:"The original find. Valley at the bottom hub, singularity in the cradle." },
    { m:'M', rot:180, name:['The ','W'],
      code:"letter W · 180° rotation",
      desc:"The M inverted. Rotate the Prime Radiant half a turn and the same four strokes read as a W — the peak now where the valley was." },
    { m:'V', rot:0,   name:['The ','V'],
      code:"letter V · 0° rotation",
      desc:"Strip the M of its legs and only the valley remains. Two diagonals meeting at the bottom hub." },
    { m:'V', rot:180, name:['The ','Λ'],
      code:"lambda · V inverted",
      desc:"The V flipped upward. In Greek letterforms, lambda — the mathematical symbol for an eigenvalue, or a wavelength." },
    { m:'A', rot:0,   name:['The ','A'],
      code:"letter A · 0° rotation",
      desc:"Apex at the top vertex, feet at the bottom corners, crossbar through the singularity." },
    { m:'X', rot:0,   name:['The ','X'],
      code:"letter X · 0° rotation",
      desc:"The inner cuboctahedron's two diagonals cross at the core. The X marks the exact spot." },
    { m:'Y', rot:0,   name:['The ','Y'],
      code:"letter Y · 0° rotation",
      desc:"Arms reach to the upper vertices, trunk descends through the singularity to the bottom hub." },
    { m:'K', rot:0,   name:['The ','K'],
      code:"letter K · 0° rotation",
      desc:"Left leg on the outer silhouette. Two diagonals kick out from its midpoint to the inner upper and lower vertices." },
    { m:'Z', rot:0,   name:['The ','Z'],
      code:"letter Z · 0° rotation",
      desc:"Top and bottom edges of the inner shell, bridged by its falling diagonal. A miniature Z nested at the heart." }
  ];

  const groups = Array.from(document.querySelectorAll('.m-group'));
  const lattice = document.getElementById('lattice');
  const rotator = document.getElementById('rotator');
  const lIdxEl = document.getElementById('l-idx');
  const lTotalEl = document.getElementById('l-total');
  const lCodeEl = document.getElementById('l-code');
  const lNameEl = document.getElementById('l-name');
  const lDescEl = document.getElementById('l-desc');
  const rotValEl = document.getElementById('rot-val');
  const axisValEl = document.getElementById('axis-val');
  const pager = document.getElementById('pager');
  const toggleBtn = document.getElementById('toggle');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  lTotalEl.textContent = String(LETTERS.length).padStart(2,'0');

  // Build pager
  LETTERS.forEach((l, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.title = l.m;
    d.addEventListener('click', () => { setCycling(false); show(i); });
    pager.appendChild(d);
  });
  const dots = Array.from(pager.querySelectorAll('.dot'));

  let current = 0;
  let cycling = true;
  let timer = null;

  function show(i) {
    current = (i + LETTERS.length) % LETTERS.length;
    const L = LETTERS[current];

    // Rotate the emblem (and all letter groups with it). Because we rotate the
    // ENTIRE group, letter highlights that were authored in upright-emblem-space
    // will also rotate — meaning from the viewer's frame, the letter appears
    // tilted at `rot`. That's the point: the Prime Radiant spins, and on that spin
    // other letters present themselves. For the viewer to SEE the letter upright,
    // we counter-rotate by the same amount... BUT then the emblem itself would be
    // unrotated and the trick disappears. So we rotate the emblem so the letter
    // reads upright to the viewer — meaning we rotate by -letter.rot (the inverse)
    // so that the letter's native orientation lands upright in the viewport.
    // Net effect: emblem spins to the angle at which this letter reads.
    rotator.style.transform = `rotate(${-L.rot}deg)`;

    // Update read-out: the angle the emblem is rotated by
    rotValEl.textContent = L.rot + '°';
    axisValEl.textContent = L.m;

    // Toggle highlight groups
    groups.forEach(g => {
      const on = g.dataset.m === L.m;
      g.querySelectorAll('.m-stroke').forEach(s => s.classList.toggle('on', on));
      g.querySelectorAll('.m-vertex').forEach(v => v.classList.toggle('on', on));
    });

    lattice.classList.add('dim');

    lIdxEl.textContent = String(current + 1).padStart(2, '0');
    lCodeEl.textContent = L.code;
    lNameEl.innerHTML = L.name[0] + '<span class="fraunces">' + L.name[1] + '</span>';
    lDescEl.textContent = L.desc;

    dots.forEach((d, di) => d.classList.toggle('active', di === current));
  }

  function startCycle() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => { show(current + 1); }, 3200);
  }
  function stopCycle() {
    if (timer) { clearInterval(timer); timer = null; }
  }
  function setCycling(on){
    cycling = on;
    toggleBtn.textContent = on ? '■ Pause' : '◈ Cycle';
    if (on) startCycle(); else stopCycle();
  }

  toggleBtn.addEventListener('click', () => setCycling(!cycling));
  prevBtn.addEventListener('click', () => { setCycling(false); show(current - 1); });
  nextBtn.addEventListener('click', () => { setCycling(false); show(current + 1); });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  prevBtn.click();
    if (e.key === 'ArrowRight') nextBtn.click();
    if (e.key === ' ')          { e.preventDefault(); toggleBtn.click(); }
  });

  show(0);
  setCycling(true);
})();
</script>
<script>
  // Skin sync — receive palette from shell
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:skin' || !d.palette) return;
    var root = document.documentElement;
    for (var key in d.palette) {
      root.style.setProperty(key, d.palette[key]);
    }
  });
</script>

</body>
</html>
