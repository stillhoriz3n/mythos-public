<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Radiant — Every M</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stage-void:   #020204;
    --stage-deep:   #08070d;
    --stage-mid:    #14121c;
    --stage-center: #1f1a2a;
    --panel:        #0c0b12;

    --rule:         #242a33;
    --rule-soft:    #1b2028;

    --signal-synth: #e8b858;
    --signal-bright:#f5c970;
    --signal-machine:#4ec9d4;

    --ink-bright:   #e8e3d4;
    --ink-soft:     #b5b0a3;
    --ink-dim:      #8a8574;
    --ink-faint:    #4a4740;

    --core-white:   #ffffff;
    --core-halo:    #fff2c8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Archivo',sans-serif;
    color:var(--ink-bright);
    background:
      radial-gradient(ellipse 1600px 900px at 50% 40%,
        var(--stage-center) 0%,
        var(--stage-mid) 35%,
        var(--stage-deep) 70%,
        var(--stage-void) 100%),
      var(--stage-void);
    overflow:hidden;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:20px;
  }

  /* faint starfield */
  .stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.7;
    z-index:0;
  }

  .shell{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
    max-width:720px;
    width:100%;
  }

  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--signal-synth);
    display:inline-flex;
    align-items:center;
    gap:14px;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";
    width:42px;height:1px;
    background:var(--signal-synth);
    opacity:0.5;
  }

  /* the stage */
  .stage{
    position:relative;
    width:min(560px, 90vw);
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .stage::before{
    /* faint grid as engineering paper */
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(color-mix(in srgb, var(--ink-bright) 3%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in srgb, var(--ink-bright) 3%, transparent) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse at center, black 45%, transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse at center, black 45%, transparent 80%);
    pointer-events:none;
    opacity:0.6;
  }

  /* corner ticks */
  .tick{
    position:absolute;
    width:22px;height:22px;
    border:1px solid var(--ink-faint);
    opacity:0.55;
    pointer-events:none;
  }
  .tick.tl{top:0;left:0;border-right:none;border-bottom:none}
  .tick.tr{top:0;right:0;border-left:none;border-bottom:none}
  .tick.bl{bottom:0;left:0;border-right:none;border-top:none}
  .tick.br{bottom:0;right:0;border-left:none;border-top:none}

  /* SVG fills the stage */
  .emblem-svg{
    width:80%;
    height:80%;
    filter: drop-shadow(0 0 40px color-mix(in srgb, var(--signal-synth) 22%, transparent));
    position:relative;
    z-index:2;
  }

  /* label block below */
  .label-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    min-height:120px;
    max-width:520px;
    text-align:center;
    padding:0 12px;
  }
  .label-idx{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }
  .label-idx .cur{color:var(--signal-synth);font-weight:600}
  .label-name{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:clamp(28px, 4vw, 40px);
    line-height:1;
    letter-spacing:-0.02em;
    color:var(--ink-bright);
    margin-top:4px;
  }
  .label-name .fraunces{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:300;
    color:var(--signal-synth);
    font-variation-settings:"opsz" 144;
  }
  .label-desc{
    font-family:'Fraunces',serif;
    font-style:italic;
    font-weight:400;
    font-size:16px;
    line-height:1.5;
    color:var(--ink-soft);
    max-width:460px;
  }

  /* controls */
  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:8px;
  }
  .ctrl-btn{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    padding:10px 16px;
    background:transparent;
    color:var(--ink-bright);
    border:1px solid var(--rule);
    border-radius:2px;
    cursor:pointer;
    transition:all 0.15s;
    display:inline-flex;
    align-items:center;
    gap:8px;
    min-width:48px;
    justify-content:center;
  }
  .ctrl-btn:hover{border-color:var(--signal-synth);color:var(--signal-synth)}
  .ctrl-btn.primary{
    background:var(--signal-synth);
    color:var(--stage-void);
    border-color:var(--signal-synth);
    font-weight:600;
    min-width:120px;
  }
  .ctrl-btn.primary:hover{background:var(--signal-bright);border-color:var(--signal-bright);color:var(--stage-void)}

  /* pager dots */
  .pager{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:4px;
  }
  .pager .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--ink-faint);
    cursor:pointer;
    transition:background 0.25s, transform 0.25s, box-shadow 0.25s;
  }
  .pager .dot:hover{background:var(--ink-dim)}
  .pager .dot.active{
    background:var(--signal-synth);
    transform:scale(1.35);
    box-shadow:0 0 10px color-mix(in srgb, var(--signal-synth) 70%, transparent);
  }

  /* M stroke animation: crossfade between M highlights */
  .m-stroke{
    stroke:var(--core-halo);
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
    opacity:0;
    transition:opacity 0.5s ease, stroke-width 0.5s ease;
    filter: drop-shadow(0 0 2.5px var(--core-halo));
  }
  .m-stroke.on{opacity:1}

  .m-vertex{
    fill:var(--core-halo);
    opacity:0;
    transition:opacity 0.5s ease;
    filter: drop-shadow(0 0 2px var(--core-halo));
  }
  .m-vertex.on{opacity:1}

  /* background lattice dims when an M is revealed */
  .lattice-bg{
    transition:opacity 0.5s ease;
  }
  .lattice-bg.dim{opacity:0.35}

  /* core pulse */
  @keyframes corepulse{
    0%,100%{opacity:1}
    50%{opacity:0.85}
  }
  .core{
    animation:corepulse 4s ease-in-out infinite;
  }

  /* tiny footer */
  footer{
    position:fixed;
    bottom:16px;
    left:0;right:0;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    letter-spacing:0.26em;
    text-transform:uppercase;
    color:var(--ink-faint);
    z-index:1;
  }
  footer .dim{color:var(--ink-faint)}
  footer .bright{color:var(--ink-dim)}
  footer .glyph{color:var(--signal-synth)}

  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .shell{animation:fadein 1.0s ease-out}
</style>
</head>
<body>

<!-- subtle starfield -->
<svg class="stars" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <g fill="#e8dfc8" opacity="0.6">
    <circle cx="120" cy="80"  r="0.9"/><circle cx="280" cy="140" r="0.7"/>
    <circle cx="520" cy="60"  r="0.8"/><circle cx="780" cy="100" r="0.6"/>
    <circle cx="980" cy="50"  r="0.9"/><circle cx="1250" cy="120" r="0.8"/>
    <circle cx="60"  cy="380" r="0.7"/><circle cx="340" cy="420" r="0.9"/>
    <circle cx="1080" cy="380" r="0.6"/><circle cx="1300" cy="440" r="0.8"/>
    <circle cx="180" cy="720" r="0.9"/><circle cx="480" cy="780" r="0.7"/>
    <circle cx="820" cy="820" r="0.8"/><circle cx="1120" cy="760" r="0.6"/>
    <circle cx="1340" cy="830" r="0.8"/>
  </g>
  <g fill="#fff2c8" opacity="0.85">
    <circle cx="220" cy="220" r="1.3"/>
    <circle cx="1180" cy="680" r="1.4"/>
  </g>
</svg>

<div class="shell">

  <div class="eyebrow">Prime Radiant · Every M</div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <span class="tick tl"></span>
    <span class="tick tr"></span>
    <span class="tick bl"></span>
    <span class="tick br"></span>

    <svg class="emblem-svg" viewBox="0 0 70 60" xmlns="http://www.w3.org/2000/svg">
      <!-- LATTICE BACKGROUND: full canonical emblem -->
      <g class="lattice-bg" id="lattice"
         fill="none" stroke="var(--signal-synth)"
         stroke-linecap="round" stroke-linejoin="round">

        <!-- outer cuboctahedron silhouette -->
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16"
          stroke-width="1.4" opacity="0.95"/>
        <!-- upper lattice -->
        <line x1="35" y1="2"  x2="35" y2="22" stroke-width="0.9" opacity="0.75"/>
        <line x1="10" y1="16" x2="35" y2="22" stroke-width="0.9" opacity="0.75"/>
        <line x1="60" y1="16" x2="35" y2="22" stroke-width="0.9" opacity="0.75"/>
        <!-- lower lattice -->
        <line x1="35" y1="58" x2="35" y2="38" stroke-width="0.9" opacity="0.65"/>
        <line x1="10" y1="44" x2="35" y2="38" stroke-width="0.9" opacity="0.65"/>
        <line x1="60" y1="44" x2="35" y2="38" stroke-width="0.9" opacity="0.65"/>
        <line x1="35" y1="22" x2="35" y2="38" stroke-width="0.7" opacity="0.5"/>
        <!-- inner cuboctahedron -->
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23"
          stroke-width="0.9" opacity="0.85"
          fill="var(--signal-synth)" fill-opacity="0.1"/>
        <line x1="35" y1="16" x2="35" y2="44" stroke-width="0.55" opacity="0.55"/>
        <line x1="23" y1="23" x2="47" y2="37" stroke-width="0.55" opacity="0.45"/>
        <line x1="47" y1="23" x2="23" y2="37" stroke-width="0.55" opacity="0.45"/>
        <!-- connecting lattice -->
        <line x1="35" y1="2"  x2="35" y2="16" stroke-width="0.55" opacity="0.55"/>
        <line x1="60" y1="16" x2="47" y2="23" stroke-width="0.55" opacity="0.55"/>
        <line x1="60" y1="44" x2="47" y2="37" stroke-width="0.55" opacity="0.55"/>
        <line x1="35" y1="58" x2="35" y2="44" stroke-width="0.55" opacity="0.55"/>
        <line x1="10" y1="44" x2="23" y2="37" stroke-width="0.55" opacity="0.55"/>
        <line x1="10" y1="16" x2="23" y2="23" stroke-width="0.55" opacity="0.55"/>
      </g>

      <!-- THE FIVE MS. Each M is a group; only one is .on at a time.
           Strokes re-use the same outer silhouette / lattice, so the highlight
           visually "thickens" existing lines and adds 0–2 new diagonals. -->

      <!-- M1 · DEEP M · outer legs, valley at bottom hub (35,38) -->
      <g class="m-group" data-m="1">
        <line class="m-stroke" x1="10" y1="16" x2="10" y2="44"/>
        <line class="m-stroke" x1="60" y1="16" x2="60" y2="44"/>
        <line class="m-stroke" x1="10" y1="16" x2="35" y2="38"/>
        <line class="m-stroke" x1="35" y1="38" x2="60" y2="16"/>
        <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="35" cy="38" r="1.4"/>
      </g>

      <!-- M2 · SHALLOW M · outer legs, valley at top hub (35,22) — CANONICAL-LATTICE-ONLY -->
      <g class="m-group" data-m="2">
        <line class="m-stroke" x1="10" y1="16" x2="10" y2="44"/>
        <line class="m-stroke" x1="60" y1="16" x2="60" y2="44"/>
        <line class="m-stroke" x1="10" y1="16" x2="35" y2="22"/>
        <line class="m-stroke" x1="35" y1="22" x2="60" y2="16"/>
        <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="35" cy="22" r="1.4"/>
      </g>

      <!-- M3 · CENTERED M · outer legs, valley at the singularity itself (35,30) -->
      <g class="m-group" data-m="3">
        <line class="m-stroke" x1="10" y1="16" x2="10" y2="44"/>
        <line class="m-stroke" x1="60" y1="16" x2="60" y2="44"/>
        <line class="m-stroke" x1="10" y1="16" x2="35" y2="30"/>
        <line class="m-stroke" x1="35" y1="30" x2="60" y2="16"/>
        <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
      </g>

      <!-- M4 · ABYSSAL M · outer legs, valley at inner-bottom vertex (35,44) —
           valley touches the leg-bottom line; deepest possible M -->
      <g class="m-group" data-m="4">
        <line class="m-stroke" x1="10" y1="16" x2="10" y2="44"/>
        <line class="m-stroke" x1="60" y1="16" x2="60" y2="44"/>
        <line class="m-stroke" x1="10" y1="16" x2="35" y2="44"/>
        <line class="m-stroke" x1="35" y1="44" x2="60" y2="16"/>
        <circle class="m-vertex" cx="10" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="16" r="1.2"/>
        <circle class="m-vertex" cx="10" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="60" cy="44" r="1.2"/>
        <circle class="m-vertex" cx="35" cy="44" r="1.4"/>
      </g>

      <!-- M5 · NESTED M · inner-shell legs (x=23 and x=47) with valley at bottom hub (35,38) -->
      <g class="m-group" data-m="5">
        <line class="m-stroke" x1="23" y1="23" x2="23" y2="37"/>
        <line class="m-stroke" x1="47" y1="23" x2="47" y2="37"/>
        <line class="m-stroke" x1="23" y1="23" x2="35" y2="38"/>
        <line class="m-stroke" x1="35" y1="38" x2="47" y2="23"/>
        <circle class="m-vertex" cx="23" cy="23" r="1.0"/>
        <circle class="m-vertex" cx="47" cy="23" r="1.0"/>
        <circle class="m-vertex" cx="23" cy="37" r="1.0"/>
        <circle class="m-vertex" cx="47" cy="37" r="1.0"/>
        <circle class="m-vertex" cx="35" cy="38" r="1.2"/>
      </g>

      <!-- CORE — stays on always -->
      <circle class="core" cx="35" cy="30" r="1.8" fill="var(--core-halo)" opacity="0.98"/>
      <circle cx="35" cy="30" r="4.5" fill="none" stroke="var(--core-halo)"
        stroke-width="0.45" opacity="0.5"/>
    </svg>
  </div>

  <!-- LABEL -->
  <div class="label-block">
    <div class="label-idx">
      M<span class="cur" id="m-idx">01</span> <span style="color:var(--ink-faint)">of</span> 05
      <span style="color:var(--ink-faint)">·</span>
      <span id="m-code">deep M</span>
    </div>
    <h2 class="label-name" id="m-name">The Deep <span class="fraunces">M</span></h2>
    <p class="label-desc" id="m-desc">
      Valley drops to the inner cuboctahedron's lower hub. The singularity
      sits inside the M's cradle.
    </p>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="prev" aria-label="Previous M">←</button>
    <button class="ctrl-btn primary" id="toggle">◈ Cycle</button>
    <button class="ctrl-btn" id="next" aria-label="Next M">→</button>
  </div>

  <div class="pager" id="pager"></div>

</div>

<footer>
  <span class="glyph">✦</span>
  <span class="bright">Prime Radiant</span>
  <span class="dim">·</span>
  <span>hidden geometry</span>
  <span class="dim">·</span>
  <span>5 Ms found in the lattice</span>
</footer>

<script>
(() => {
  const MS = [
    {
      code: "deep M",
      name: ['The Deep ', 'M'],
      desc: "Valley drops to the inner cuboctahedron's lower hub. The singularity sits inside the M's cradle."
    },
    {
      code: "shallow M · canonical-only",
      name: ['The Shallow ', 'M'],
      desc: "Every stroke exists in the canonical mark. No new lines added — this M is discovered, not drawn."
    },
    {
      code: "centered M · valley = core",
      name: ['The Centered ', 'M'],
      desc: "The valley lands exactly on the singularity. The M and the hot event share a vertex."
    },
    {
      code: "abyssal M · deepest possible",
      name: ['The Abyssal ', 'M'],
      desc: "Valley reaches the inner-bottom vertex, level with the leg bottoms. The M devours its own floor."
    },
    {
      code: "nested M · inner shell",
      name: ['The Nested ', 'M'],
      desc: "An M hidden inside the M. Legs ride the inner cuboctahedron, valley meets the lower hub."
    }
  ];

  const groups = Array.from(document.querySelectorAll('.m-group'));
  const lattice = document.getElementById('lattice');
  const mIdxEl = document.getElementById('m-idx');
  const mCodeEl = document.getElementById('m-code');
  const mNameEl = document.getElementById('m-name');
  const mDescEl = document.getElementById('m-desc');
  const pager = document.getElementById('pager');
  const toggleBtn = document.getElementById('toggle');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  // build pager dots
  MS.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.dataset.idx = i;
    d.addEventListener('click', () => { cycling = false; toggleBtn.textContent = '◈ Cycle'; show(i); });
    pager.appendChild(d);
  });
  const dots = Array.from(pager.querySelectorAll('.dot'));

  let current = 0;
  let cycling = true;
  let timer = null;

  function show(i) {
    current = (i + MS.length) % MS.length;
    const m = MS[current];

    // toggle groups
    groups.forEach((g, gi) => {
      const on = gi === current;
      g.querySelectorAll('.m-stroke').forEach(s => s.classList.toggle('on', on));
      g.querySelectorAll('.m-vertex').forEach(v => v.classList.toggle('on', on));
    });

    // dim the lattice so the M reads
    lattice.classList.add('dim');

    // update label
    mIdxEl.textContent = String(current + 1).padStart(2, '0');
    mCodeEl.textContent = m.code;
    mNameEl.innerHTML = m.name[0] + '<span class="fraunces">' + m.name[1] + '</span>';
    mDescEl.textContent = m.desc;

    // update pager
    dots.forEach((d, di) => d.classList.toggle('active', di === current));
  }

  function startCycle() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => { show(current + 1); }, 2800);
  }

  function stopCycle() {
    if (timer) { clearInterval(timer); timer = null; }
  }

  toggleBtn.addEventListener('click', () => {
    cycling = !cycling;
    if (cycling) {
      toggleBtn.textContent = '■ Pause';
      startCycle();
    } else {
      toggleBtn.textContent = '◈ Cycle';
      stopCycle();
    }
  });

  prevBtn.addEventListener('click', () => {
    cycling = false; stopCycle(); toggleBtn.textContent = '◈ Cycle';
    show(current - 1);
  });
  nextBtn.addEventListener('click', () => {
    cycling = false; stopCycle(); toggleBtn.textContent = '◈ Cycle';
    show(current + 1);
  });

  // keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { prevBtn.click(); }
    if (e.key === 'ArrowRight') { nextBtn.click(); }
    if (e.key === ' ')          { e.preventDefault(); toggleBtn.click(); }
  });

  // start
  show(0);
  toggleBtn.textContent = '■ Pause';
  startCycle();
})();
</script>

</body>
</html>
