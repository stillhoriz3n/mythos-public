<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mysubstrate.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_mythos-meters.css">
<style>
:root {
  --signal-synth: #e8b858;
  --signal-synth-bright: #f5c970;
  --signal-synth-dim: rgba(232,184,88,0.12);
  --signal-machine: #4ec9d4;
  --ink-bright: #e8e3d4;
  --ink-soft: #b5b0a3;
  --ink-dim: #8a8574;
  --ink-faint: #4a4740;
  --stage-void: #020204;
  --rule: #242a33;
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: transparent;
  color: var(--ink-bright);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

.portal {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 3;
  padding: 40px 24px;
}

/* ── PRIME RADIANT EMBLEM ─────────────────── */
.emblem {
  width: clamp(200px, 40vh, 380px);
  height: clamp(200px, 40vh, 380px);
  margin-bottom: 48px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.emblem svg {
  width: 100%;
  height: 100%;
  color: var(--signal-synth);
  filter: drop-shadow(0 0 40px rgba(232,184,88,0.15));
  transition: filter 200ms ease;
}

/* Breathing animation driven by --beat-bar-pulse when music plays,
   falls back to CSS keyframe breath when idle */
.emblem svg {
  animation: emblem-breath 6s ease-in-out infinite;
  transform: scale(calc(1 + 0.03 * var(--beat-bar-pulse, 0)));
  filter: drop-shadow(0 0 calc(40px + 30px * var(--beat-bar-pulse, 0)) rgba(232,184,88, calc(0.15 + 0.2 * var(--beat-bar-pulse, 0))));
}

@keyframes emblem-breath {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 1; }
}

/* ── TAGLINE ──────────────────────────────── */
.tagline {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 72;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.2rem, 2.8vw, 2.2rem);
  color: var(--ink-bright);
  text-align: center;
  margin-bottom: 56px;
  letter-spacing: -0.015em;
  line-height: 1.3;
  opacity: 0;
  animation: rise 1s ease-out 0.3s forwards;
}

/* ── DOORS ────────────────────────────────── */
.doors {
  display: flex;
  gap: 20px;
  align-items: center;
  opacity: 0;
  animation: rise 1s ease-out 0.6s forwards;
}

.door {
  padding: 16px 28px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  white-space: nowrap;
}

.door:hover {
  border-color: var(--signal-synth);
  color: var(--ink-bright);
  box-shadow: 0 0 24px rgba(232,184,88,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  transform: translateY(-1px);
}

.door.primary {
  border-color: rgba(232,184,88,0.25);
  color: var(--signal-synth);
}

.door.primary:hover {
  background: var(--signal-synth-dim);
  border-color: var(--signal-synth);
  color: var(--signal-synth-bright);
  box-shadow: 0 0 32px rgba(232,184,88,0.12);
}

/* ── EMAIL INLINE ─────────────────────────── */
.email-capture {
  margin-top: 24px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: rise 0.4s ease-out forwards;
}

.email-capture.visible {
  display: flex;
}

.email-row {
  display: flex;
  gap: 0;
  width: 100%;
  max-width: 400px;
}

.email-input {
  flex: 1;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--rule);
  border-right: none;
  border-radius: 6px 0 0 6px;
  color: var(--ink-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.email-input:focus {
  border-color: var(--signal-synth);
  box-shadow: 0 0 0 3px var(--signal-synth-dim);
}

.email-input::placeholder {
  color: var(--ink-faint);
}

.email-send {
  padding: 14px 20px;
  background: var(--signal-synth);
  border: 1px solid var(--signal-synth);
  border-radius: 0 6px 6px 0;
  color: var(--stage-void);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}

.email-send:hover {
  background: var(--signal-synth-bright);
}

.email-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.email-note {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 13px;
  color: var(--ink-dim);
  transition: color 0.3s;
}

.email-note.sent {
  color: var(--signal-synth);
}

/* ── FOOTER ───────────────────────────────── */
.credit {
  position: absolute;
  bottom: 32px;
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--ink-faint);
  opacity: 0;
  animation: rise 1s ease-out 1s forwards;
}

/* ── ANIMATIONS ───────────────────────────── */
@keyframes rise {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ───────────────────────────── */
@media (max-width: 600px) {
  .doors {
    flex-direction: column;
    width: 100%;
    max-width: 300px;
  }
  .door {
    width: 100%;
    text-align: center;
  }
  .tagline {
    font-size: 1.3rem;
    margin-bottom: 40px;
  }
  .emblem {
    margin-bottom: 36px;
  }
  .email-row {
    max-width: 100%;
  }
}

::selection {
  background: var(--signal-synth);
  color: var(--stage-void);
}
</style>
</head>
<body>

<div class="portal">

  <!-- PRIME RADIANT -->
  <div class="emblem">
    <svg viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="core" cx=".5" cy=".5" r=".5">
          <stop offset="0%" stop-color="#fff2c8" stop-opacity=".9"/>
          <stop offset="8%" stop-color="#ffdf8a" stop-opacity=".55"/>
          <stop offset="22%" stop-color="#e8b858" stop-opacity=".25"/>
          <stop offset="50%" stop-color="#d9a441" stop-opacity=".08"/>
          <stop offset="100%" stop-color="#8b5a1e" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="halo" cx=".5" cy=".5" r=".5">
          <stop offset="0%" stop-color="#e8b858" stop-opacity=".06"/>
          <stop offset="40%" stop-color="#d9a441" stop-opacity=".02"/>
          <stop offset="100%" stop-color="#d9a441" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="340" cy="340" r="340" fill="url(#halo)"/>
      <circle cx="340" cy="340" r="200" fill="url(#core)" opacity=".45"/>
      <circle cx="340" cy="340" r="100" fill="url(#core)" opacity=".75"/>
      <circle cx="340" cy="340" r="38" fill="url(#core)" opacity=".9"/>
      <g transform="translate(270 280) scale(2)" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.2" opacity=".95"/>
        <line x1="35" y1="2" x2="35" y2="22" stroke-width=".8" opacity=".65"/>
        <line x1="10" y1="16" x2="35" y2="22" stroke-width=".8" opacity=".65"/>
        <line x1="60" y1="16" x2="35" y2="22" stroke-width=".8" opacity=".65"/>
        <line x1="35" y1="58" x2="35" y2="38" stroke-width=".8" opacity=".55"/>
        <line x1="10" y1="44" x2="35" y2="38" stroke-width=".8" opacity=".55"/>
        <line x1="60" y1="44" x2="35" y2="38" stroke-width=".8" opacity=".55"/>
        <line x1="35" y1="22" x2="35" y2="38" stroke-width=".6" opacity=".45"/>
        <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".8" opacity=".85" fill="currentColor" fill-opacity=".1"/>
        <line x1="35" y1="16" x2="35" y2="44" stroke-width=".5" opacity=".5"/>
        <line x1="23" y1="23" x2="47" y2="37" stroke-width=".5" opacity=".4"/>
        <line x1="47" y1="23" x2="23" y2="37" stroke-width=".5" opacity=".4"/>
      </g>
      <circle cx="340" cy="340" r="3" fill="#ffffff"/>
      <circle cx="340" cy="340" r="6" fill="currentColor" opacity=".85"/>
    </svg>
  </div>

  <!-- TAGLINE -->
  <p class="tagline">Free your Mind.</p>

  <!-- TWO DOORS -->
  <div class="doors">
    <button class="door primary" id="door-email">Email Me the Explanation</button>
    <a class="door" href="ask-jarvis.html" data-mythos-link>Ask Jarvis <span style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:14px">&rarr;</span></a>
  </div>

  <!-- EMAIL CAPTURE (appears on click) -->
  <div class="email-capture" id="email-capture">
    <div class="email-row">
      <input class="email-input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      <button class="email-send" id="email-send" disabled>send &rarr;</button>
    </div>
    <span class="email-note" id="email-note">Receive the formal proof &amp; mission statement.</span>
  </div>

  <!-- CREDIT -->
  <div class="credit">HORIZ3N &middot; 2026 &middot; Edition I</div>

</div>

<script>
(function() {
  var doorEmail = document.getElementById('door-email');
  var capture = document.getElementById('email-capture');
  var emailInput = document.getElementById('email');
  var emailSend = document.getElementById('email-send');
  var emailNote = document.getElementById('email-note');

  doorEmail.addEventListener('click', function() {
    capture.classList.add('visible');
    doorEmail.style.display = 'none';
    setTimeout(function() { emailInput.focus(); }, 100);
  });

  emailInput.addEventListener('input', function() {
    emailSend.disabled = !emailInput.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
  });

  emailInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !emailSend.disabled) submitEmail();
  });

  emailSend.addEventListener('click', submitEmail);

  function submitEmail() {
    var email = emailInput.value.trim();
    if (!email) return;

    var entry = { email: email, source: 'mysubstrate', ts: new Date().toISOString() };

    fetch('https://script.google.com/macros/s/AKfycbxYz0SjghuFujuMI5ShaygDDKDv7Mz9oWLfe18xxnMHK4jeOy5EJCum6CHfjdiHPuFC/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    }).catch(function() {});

    var existing = JSON.parse(localStorage.getItem('mythos_waitlist') || '[]');
    existing.push(entry);
    localStorage.setItem('mythos_waitlist', JSON.stringify(existing));

    emailInput.disabled = true;
    emailSend.disabled = true;
    emailSend.textContent = '✓';
    emailNote.textContent = "You'll hear from Jarvis.";
    emailNote.classList.add('sent');
  }

  // Navigation for in-iframe links
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[data-mythos-link]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('#')) return;
    if (window.parent && window.parent !== window) {
      e.preventDefault();
      window.parent.postMessage({ type: 'mythos:nav', href: href }, '*');
    }
  });

  // Skin sync
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || d.type !== 'mythos:skin' || !d.palette) return;
    var root = document.documentElement;
    for (var key in d.palette) {
      root.style.setProperty(key, d.palette[key]);
    }
  });

  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'mythos:skin:subscribe' }, '*');
  }
})();
</script>
<script src="_mythos-page.js"></script>
</body>
</html>
