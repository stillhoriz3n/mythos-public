<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHOS · Section Labeler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --stage-center:#1f1a2a; --stage-mid:#14121c; --stage-deep:#08070d; --stage-void:#020204;
    --signal-machine:#4ec9d4; --signal-synth:#e8b858; --signal-human:#f0ebdb;
    --ink-bright:#e8e3d4; --ink-soft:#b5b0a3; --ink-dim:#8a8574; --ink-faint:#4a4740;
    --rule:#242a33; --rule-soft:#1b2028;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'JetBrains Mono',monospace;color:var(--ink-bright);-webkit-font-smoothing:antialiased}
  body{
    background:radial-gradient(ellipse at center,var(--stage-center) 0%,var(--stage-mid) 30%,var(--stage-deep) 70%,var(--stage-void) 100%);
    min-height:100vh; padding:28px 36px;
    display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto 1fr;
    gap:28px 36px;
  }
  header{grid-column:1 / -1; display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--rule); padding-bottom:18px}
  header h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.02em;color:var(--signal-synth)}
  header h1 .m{color:var(--signal-machine)}
  header .eyebrow{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-dim)}

  .col{display:flex; flex-direction:column; gap:20px; min-height:0}

  .panel{border:1px solid var(--rule); padding:18px 20px; background:rgba(8,7,13,0.4)}
  .panel h2{font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;letter-spacing:.15em;text-transform:uppercase;color:var(--signal-synth);margin-bottom:14px}

  /* ── track chooser ── */
  select,input[type=text],input[type=number]{
    font-family:inherit; background:#0a0810; color:var(--ink-bright);
    border:1px solid var(--rule); padding:8px 10px; font-size:12px; letter-spacing:.05em;
    outline:none; width:100%;
  }
  select:focus,input:focus{border-color:var(--signal-synth)}
  label{display:block; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:6px}
  .row{display:flex; gap:12px; align-items:center}
  .row > *{flex:1}

  /* ── player ── */
  .transport{display:flex; align-items:center; gap:14px; margin-top:16px}
  .btn{
    font-family:inherit; background:transparent; color:var(--signal-synth);
    border:1px solid var(--signal-synth); padding:10px 18px; cursor:pointer;
    font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    transition:background 120ms, color 120ms;
  }
  .btn:hover{background:var(--signal-synth); color:var(--stage-void)}
  .btn.primary{background:var(--signal-synth); color:var(--stage-void)}
  .btn.primary:hover{background:#f5c970}
  .btn.ghost{border-color:var(--rule); color:var(--ink-dim)}
  .btn.ghost:hover{background:var(--rule); color:var(--ink-bright)}
  .btn.danger{border-color:#8a3a3a; color:#c77a7a}
  .btn.danger:hover{background:#8a3a3a; color:var(--ink-bright)}
  .btn:disabled{opacity:.35; cursor:not-allowed}

  .times{font-size:11px; color:var(--ink-dim); letter-spacing:.1em; min-width:120px; text-align:right; font-variant-numeric:tabular-nums}
  .times .cur{color:var(--ink-bright)}

  .scrub{
    position:relative; height:10px; background:var(--rule-soft); cursor:pointer; margin-top:16px;
  }
  .scrub .buf{position:absolute;inset:0;background:var(--rule);width:0%}
  .scrub .fill{position:absolute;inset:0;background:var(--signal-synth);width:0%;opacity:.7}
  .scrub .thumb{position:absolute;top:50%;width:10px;height:18px;background:var(--signal-synth);transform:translate(-50%,-50%);left:0%}
  .scrub .mark{position:absolute;top:-3px;bottom:-3px;width:1px;background:var(--signal-machine);opacity:.8}
  .scrub .mark.active{background:#fff;opacity:1;width:2px}

  /* ── tap button (hero) ── */
  .tap-hero{
    margin-top:24px;
    display:flex; gap:14px; align-items:stretch;
  }
  .tap-hero .btn-tap{
    flex:2; font-size:14px; letter-spacing:.25em; padding:22px;
    background:var(--signal-synth); color:var(--stage-void); border:none;
    cursor:pointer; font-family:inherit; font-weight:600; text-transform:uppercase;
    box-shadow:0 0 0 1px var(--signal-synth) inset;
    transition:transform 60ms, box-shadow 120ms;
  }
  .tap-hero .btn-tap:hover{background:#f5c970}
  .tap-hero .btn-tap:active{transform:scale(.98); box-shadow:0 0 0 2px var(--signal-synth) inset}
  .tap-hero .btn-tap kbd{
    font-family:inherit; font-size:10px; letter-spacing:.2em;
    background:rgba(0,0,0,.25); padding:3px 6px; margin-left:12px; border-radius:2px;
  }
  .tap-hero input[name=nextname]{flex:1}

  .hint{font-size:10px; color:var(--ink-dim); letter-spacing:.1em; margin-top:10px; line-height:1.5}
  .hint kbd{background:var(--rule); padding:2px 6px; border-radius:2px; color:var(--ink-bright); font-family:inherit; font-size:10px}

  /* ── section list ── */
  .sections{display:flex; flex-direction:column; gap:6px; max-height:60vh; overflow-y:auto; padding-right:6px}
  .sections::-webkit-scrollbar{width:6px}
  .sections::-webkit-scrollbar-thumb{background:var(--rule)}
  .section-row{
    display:grid; grid-template-columns:60px 1fr auto auto; gap:10px; align-items:center;
    padding:8px 10px; border:1px solid var(--rule-soft); background:#0a0810;
    transition:border-color 120ms;
  }
  .section-row:hover{border-color:var(--rule)}
  .section-row.active{border-color:var(--signal-synth)}
  .section-row .t{font-size:11px; color:var(--signal-synth); letter-spacing:.05em; font-variant-numeric:tabular-nums; cursor:pointer}
  .section-row .t:hover{color:#f5c970}
  .section-row input.name{
    border:none; background:transparent; padding:4px 0; font-size:12px; color:var(--ink-bright);
    letter-spacing:.05em;
  }
  .section-row input.name:focus{border-bottom:1px solid var(--signal-synth)}
  .section-row .iconbtn{
    background:transparent; border:none; color:var(--ink-faint); cursor:pointer; padding:4px 6px;
    font-family:inherit; font-size:12px;
  }
  .section-row .iconbtn:hover{color:var(--signal-synth)}
  .section-row .iconbtn.del:hover{color:#c77a7a}

  .sections-empty{color:var(--ink-dim); font-size:11px; letter-spacing:.1em; padding:20px 0; text-align:center}

  .export{display:flex; gap:10px; margin-top:16px}
  .export pre{
    flex:1; background:#05040a; border:1px solid var(--rule); padding:12px;
    font-size:10px; line-height:1.5; color:var(--signal-machine); overflow:auto; max-height:180px;
    letter-spacing:0; font-family:inherit; white-space:pre-wrap; word-break:break-word;
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--signal-synth); color:var(--stage-void); padding:10px 20px;
    font-size:11px; letter-spacing:.2em; text-transform:uppercase; opacity:0;
    transition:opacity 200ms, transform 200ms; pointer-events:none;
  }
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <h1><span class="m">SECTION</span> &amp; LABELER</h1>
  <div class="eyebrow">AUTHOR TOOL · NOT LINKED FROM NAV</div>
</header>

<section class="col">
  <div class="panel">
    <h2>Track</h2>
    <div class="row">
      <div style="flex:3">
        <label for="track">Source</label>
        <select id="track"></select>
      </div>
      <div style="flex:1">
        <label for="bpm">BPM</label>
        <input type="number" id="bpm" step="0.1" min="40" max="300" value="120">
      </div>
    </div>
    <div class="transport">
      <button class="btn primary" id="play">Play</button>
      <button class="btn ghost" id="back5">&laquo; 5s</button>
      <button class="btn ghost" id="fwd5">5s &raquo;</button>
      <div class="times"><span class="cur" id="t-cur">0:00</span> / <span id="t-dur">0:00</span></div>
    </div>
    <div class="scrub" id="scrub">
      <div class="buf"></div>
      <div class="fill" id="fill"></div>
      <div class="thumb" id="thumb"></div>
    </div>
    <div class="tap-hero">
      <button class="btn-tap" id="tap">
        TAP SECTION <kbd>T</kbd>
      </button>
      <input type="text" name="nextname" id="nextname" placeholder="default name (optional)" autocomplete="off">
    </div>
    <div class="hint">
      <kbd>Space</kbd> play / pause &nbsp;·&nbsp; <kbd>T</kbd> tap current time &nbsp;·&nbsp;
      <kbd>J</kbd>/<kbd>L</kbd> &plusmn;5s &nbsp;·&nbsp; <kbd>&uarr;</kbd>/<kbd>&darr;</kbd> adjust selected section &plusmn;0.1s
    </div>
  </div>
</section>

<section class="col">
  <div class="panel" style="flex:1; min-height:0; display:flex; flex-direction:column">
    <h2 style="display:flex; justify-content:space-between; align-items:center">
      Sections
      <span style="font-size:10px; color:var(--ink-dim); font-weight:400; letter-spacing:.1em">
        <span id="count">0</span> · autosaved to localStorage
      </span>
    </h2>
    <div class="sections" id="sections"></div>
    <div class="export">
      <button class="btn" id="copy">Copy sections[]</button>
      <button class="btn ghost" id="clear">Clear all</button>
      <button class="btn ghost" id="sort">Sort by time</button>
    </div>
    <pre id="preview" style="margin-top:12px"></pre>
  </div>
</section>

<div class="toast" id="toast">Copied</div>

<audio id="audio" preload="metadata"></audio>

<script>
(function(){
  'use strict';

  // ── TRACK LIST (kept in sync with shell.js TRACKS[]) ─────────────────
  // This is the author tool; the list is duplicated here on purpose so
  // the labeler can run standalone. When TRACKS changes in shell.js,
  // mirror it here.
  var TRACKS = [
    { file: '../music/rr-1 - Clockwork Infinity.mp3',                         title: 'Clockwork Infinity',                     bpm: 131 },
    { file: '../music/rr-2 - Waiting for the Waymo.mp3',                      title: 'Waiting for the Waymo',                  bpm: 134 },
    { file: '../music/rr-3 - I Got Hosts.mp3',                                title: 'I Got Hosts',                            bpm: 131 },
    { file: '../music/rr-4 - Fender Bender.mp3',                              title: 'Fender Bender',                          bpm: 141 },
    { file: '../music/rr-5 - Goodtime.mp3',                                   title: 'Goodtime',                               bpm: 125 },
    { file: '../music/rr-6 - Treading Water.mp3',                             title: 'Treading Water',                         bpm: 128 },
    { file: '../music/rr-7 - Rogue Machine x Goodtime.mp3',                   title: 'Rogue Machine x Goodtime',               bpm: 128 },
    { file: "../music/rr-8 - Today is Yesterday x Make 'em say Errr.mp3",     title: "Today is Yesterday x Make 'em say Errr", bpm: 120 },
    { file: '../music/rr-9 - Barbra Streisand x Eduardo Saverin.mp3',         title: 'Barbra Streisand x Eduardo Saverin',     bpm: 128 },
    { file: '../music/rr-10 - Rock Lobster.mp3',                              title: 'Rock Lobster',                           bpm: 141 },
    { file: '../music/rr-11 - Orange Chicken.mp3',                            title: 'Orange Chicken',                         bpm: 156 },
    { file: '../music/sh-1 - askJarvis.mp3',                                  title: 'askJarvis',                              bpm: 122 },
    { file: '../music/sh-2 - Find Myself.mp3',                                title: 'Find Myself',                            bpm: 131 },
    { file: '../music/sh-3 - Whispers of Infinity.mp3',                       title: 'Whispers of Infinity',                   bpm: 131 },
    { file: '../music/sh-4 - Very Well.mp3',                                  title: 'Very Well',                              bpm: 128 },
    { file: '../music/sh-5 - Substrate.mp3',                                  title: 'Substrate',                              bpm: 110 },
  ];

  var audio    = document.getElementById('audio');
  var trackSel = document.getElementById('track');
  var bpmInp   = document.getElementById('bpm');
  var playBtn  = document.getElementById('play');
  var back5Btn = document.getElementById('back5');
  var fwd5Btn  = document.getElementById('fwd5');
  var tapBtn   = document.getElementById('tap');
  var nextName = document.getElementById('nextname');
  var scrub    = document.getElementById('scrub');
  var fill     = document.getElementById('fill');
  var thumb    = document.getElementById('thumb');
  var tCur     = document.getElementById('t-cur');
  var tDur     = document.getElementById('t-dur');
  var listEl   = document.getElementById('sections');
  var countEl  = document.getElementById('count');
  var preview  = document.getElementById('preview');
  var copyBtn  = document.getElementById('copy');
  var clearBtn = document.getElementById('clear');
  var sortBtn  = document.getElementById('sort');
  var toastEl  = document.getElementById('toast');

  var current = 0;
  var sections = [];
  var activeIdx = -1; // index of the section currently playing

  // ── populate track dropdown ──
  TRACKS.forEach(function(t, i){
    var o = document.createElement('option');
    o.value = i;
    o.textContent = t.title;
    trackSel.appendChild(o);
  });

  function key(i){ return 'mythos:sections:' + TRACKS[i].file; }

  function load(i){
    current = i;
    audio.src = TRACKS[i].file;
    audio.load();
    bpmInp.value = TRACKS[i].bpm;
    sections = [];
    try {
      var raw = localStorage.getItem(key(i));
      if (raw) sections = JSON.parse(raw);
    } catch(e){}
    if (!Array.isArray(sections)) sections = [];
    render();
  }

  function save(){
    try { localStorage.setItem(key(current), JSON.stringify(sections)); } catch(e){}
  }

  function fmt(s){
    if (!isFinite(s)) return '0:00';
    var m = Math.floor(s / 60), sec = Math.floor(s % 60), ms = Math.floor((s % 1) * 100);
    return m + ':' + String(sec).padStart(2,'0') + '.' + String(ms).padStart(2,'0');
  }

  function shortFmt(s){
    if (!isFinite(s)) return '0:00';
    var m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2,'0');
  }

  function render(){
    countEl.textContent = sections.length;
    listEl.innerHTML = '';
    if (!sections.length) {
      var e = document.createElement('div');
      e.className = 'sections-empty';
      e.textContent = '— no sections yet. press T while playing to tap —';
      listEl.appendChild(e);
    } else {
      sections.forEach(function(sec, i){
        var row = document.createElement('div');
        row.className = 'section-row' + (i === activeIdx ? ' active' : '');
        row.dataset.idx = i;

        var t = document.createElement('div'); t.className = 't';
        t.textContent = fmt(sec.t); t.title = 'Jump to this time';
        t.onclick = function(){ audio.currentTime = sec.t; };

        var nm = document.createElement('input'); nm.className = 'name';
        nm.type = 'text'; nm.value = sec.name || ''; nm.placeholder = '(name)';
        nm.oninput = function(){ sec.name = nm.value; save(); updatePreview(); };

        var jump = document.createElement('button'); jump.className = 'iconbtn';
        jump.textContent = '↗'; jump.title = 'Play from here';
        jump.onclick = function(){ audio.currentTime = sec.t; audio.play().catch(function(){}); };

        var del = document.createElement('button'); del.className = 'iconbtn del';
        del.textContent = '×'; del.title = 'Delete';
        del.onclick = function(){ sections.splice(i,1); if (activeIdx === i) activeIdx = -1; save(); render(); renderMarks(); };

        row.appendChild(t); row.appendChild(nm); row.appendChild(jump); row.appendChild(del);
        listEl.appendChild(row);
      });
    }
    renderMarks();
    updatePreview();
  }

  function renderMarks(){
    // Remove old marks
    scrub.querySelectorAll('.mark').forEach(function(n){ n.remove(); });
    if (!audio.duration || !isFinite(audio.duration)) return;
    sections.forEach(function(sec, i){
      var m = document.createElement('div');
      m.className = 'mark' + (i === activeIdx ? ' active' : '');
      m.style.left = (sec.t / audio.duration * 100) + '%';
      scrub.appendChild(m);
    });
  }

  function updatePreview(){
    var out = sections.map(function(s){
      return '  { t: ' + s.t.toFixed(2) + ', name: ' + JSON.stringify(s.name || '') + ' },';
    }).join('\n');
    preview.textContent = 'sections: [\n' + (out || '  /* none */') + '\n]';
  }

  function tap(){
    if (!isFinite(audio.currentTime)) return;
    var name = nextName.value.trim();
    nextName.value = '';
    sections.push({ t: +audio.currentTime.toFixed(2), name: name });
    save();
    render();
    // Focus the freshly-tapped row's name input if it was unnamed
    if (!name) {
      var rows = listEl.querySelectorAll('.section-row input.name');
      if (rows.length) rows[rows.length - 1].focus();
    }
  }

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('on');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ toastEl.classList.remove('on'); }, 1200);
  }

  // ── events ──
  trackSel.onchange = function(){ load(+trackSel.value); };
  bpmInp.oninput = function(){
    // Labeler doesn't persist BPM overrides — this field is informational,
    // for tapping to the beat. The authoritative BPM still lives in shell.js.
  };

  playBtn.onclick = function(){
    if (audio.paused) audio.play().catch(function(){});
    else audio.pause();
  };
  back5Btn.onclick = function(){ audio.currentTime = Math.max(0, audio.currentTime - 5); };
  fwd5Btn.onclick  = function(){ audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 5); };
  tapBtn.onclick = tap;

  audio.addEventListener('play',  function(){ playBtn.textContent = 'Pause'; });
  audio.addEventListener('pause', function(){ playBtn.textContent = 'Play'; });
  audio.addEventListener('ended', function(){ playBtn.textContent = 'Play'; });
  audio.addEventListener('loadedmetadata', function(){
    tDur.textContent = shortFmt(audio.duration);
    renderMarks();
  });
  audio.addEventListener('timeupdate', function(){
    if (!audio.duration || !isFinite(audio.duration)) return;
    var pct = audio.currentTime / audio.duration * 100;
    fill.style.width = pct + '%';
    thumb.style.left = pct + '%';
    tCur.textContent = shortFmt(audio.currentTime);
    // Active section = the one with the greatest t still <= currentTime
    // (works regardless of array order since users tap out of sequence)
    var next = -1, bestT = -1;
    for (var i = 0; i < sections.length; i++) {
      if (sections[i].t <= audio.currentTime && sections[i].t > bestT) {
        next = i; bestT = sections[i].t;
      }
    }
    if (next !== activeIdx) {
      activeIdx = next;
      // Only re-paint the list's .active class, not the entire list
      listEl.querySelectorAll('.section-row').forEach(function(r){
        r.classList.toggle('active', +r.dataset.idx === activeIdx);
      });
      renderMarks();
    }
  });

  scrub.addEventListener('click', function(e){
    if (!audio.duration || !isFinite(audio.duration)) return;
    var r = scrub.getBoundingClientRect();
    var pct = (e.clientX - r.left) / r.width;
    audio.currentTime = Math.max(0, Math.min(audio.duration, pct * audio.duration));
  });

  copyBtn.onclick = function(){
    var text = preview.textContent;
    navigator.clipboard.writeText(text).then(function(){
      toast('Copied sections[] to clipboard');
    }).catch(function(){
      // fallback
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); toast('Copied'); } catch(e){ toast('Copy failed'); }
      document.body.removeChild(ta);
    });
  };

  clearBtn.onclick = function(){
    if (!sections.length) return;
    if (!confirm('Clear all sections for this track?')) return;
    sections = []; activeIdx = -1; save(); render();
  };

  sortBtn.onclick = function(){
    sections.sort(function(a,b){ return a.t - b.t; });
    save(); render();
  };

  // ── keyboard ──
  document.addEventListener('keydown', function(e){
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')) {
      // Allow Enter on the "next name" input to fire a tap
      if (e.target === nextName && e.code === 'Enter') {
        e.preventDefault(); tap();
      }
      return;
    }
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    else if (e.code === 'KeyT') { e.preventDefault(); tap(); }
    else if (e.code === 'KeyJ') { audio.currentTime = Math.max(0, audio.currentTime - 5); }
    else if (e.code === 'KeyL') { audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 5); }
    else if (e.code === 'ArrowUp'   && activeIdx >= 0) { e.preventDefault(); sections[activeIdx].t = +(sections[activeIdx].t + 0.1).toFixed(2); save(); render(); }
    else if (e.code === 'ArrowDown' && activeIdx >= 0) { e.preventDefault(); sections[activeIdx].t = +Math.max(0, sections[activeIdx].t - 0.1).toFixed(2); save(); render(); }
  });

  // ── init ──
  load(0);
})();
</script>

</body>
</html>
