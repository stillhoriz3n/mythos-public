<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020204">
<title>Jarvis — mysubstrate.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --signal-synth: #e8b858;
  --signal-synth-bright: #f5c970;
  --signal-synth-dim: rgba(232,184,88,0.12);
  --ink-bright: #e8e3d4;
  --ink-soft: #b5b0a3;
  --ink-dim: #8a8574;
  --ink-faint: #4a4740;
  --stage-void: #020204;
  --rule-soft: #1b2028;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #020204 !important; }
body {
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--stage-void);
  color: var(--ink-bright);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.container {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 24px;
}

.header {
  padding: 48px 0 0;
  text-align: center;
  flex-shrink: 0;
  opacity: 0;
  animation: rise 0.8s ease-out 0.1s forwards;
}

.mark {
  display: inline-block;
  width: 32px;
  height: 32px;
  margin-bottom: 20px;
}

.mark svg {
  width: 100%;
  height: 100%;
  color: var(--signal-synth);
  filter: drop-shadow(0 0 12px rgba(232,184,88,0.25));
  animation: mark-breath 5s ease-in-out infinite;
}

@keyframes mark-breath {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; }
}

.name {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 96;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--signal-synth);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-dim);
}

.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 40px 0 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--ink-faint) transparent;
}

.conversation::-webkit-scrollbar { width: 4px; }
.conversation::-webkit-scrollbar-track { background: transparent; }
.conversation::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

.msg { opacity: 0; animation: rise 0.4s ease-out forwards; }
.msg-user { text-align: right; }

.msg-user .bubble {
  display: inline-block;
  background: rgba(232,184,88,0.08);
  border: 1px solid rgba(232,184,88,0.2);
  border-radius: 14px 14px 4px 14px;
  padding: 12px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-bright);
  max-width: 85%;
  text-align: left;
}

.msg-jarvis { text-align: left; }

.msg-jarvis .sender {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 12px;
  color: var(--signal-synth);
  margin-bottom: 6px;
  padding-left: 2px;
}

.msg-jarvis .bubble {
  display: inline-block;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 4px 14px 14px 14px;
  padding: 14px 20px;
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 24;
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-soft);
  max-width: 90%;
}

.msg-jarvis .bubble em { color: var(--signal-synth); font-style: italic; }
.msg-jarvis .bubble strong { color: var(--ink-bright); font-weight: 500; }

.typing {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 14px 20px;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 4px 14px 14px 14px;
}

.typing span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--signal-synth);
  opacity: 0.4;
  animation: typing-dot 1.4s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing-dot {
  0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-3px); }
}

.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 32px;
  opacity: 0;
  animation: rise 0.8s ease-out 0.4s forwards;
}

.welcome-text {
  font-family: 'Fraunces', serif;
  font-variation-settings: "opsz" 48;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(16px, 2.5vw, 20px);
  color: var(--ink-dim);
  text-align: center;
  line-height: 1.6;
  max-width: 400px;
}

.prompts {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  max-width: 500px;
}

.prompt-chip {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--rule-soft);
  border-radius: 20px;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 13px;
  color: var(--ink-dim);
  cursor: pointer;
  transition: all 0.2s ease;
}

.prompt-chip:hover {
  border-color: rgba(232,184,88,0.3);
  color: var(--signal-synth);
  background: var(--signal-synth-dim);
}

.input-area {
  flex-shrink: 0;
  padding: 16px 0 32px;
  border-top: 1px solid var(--rule-soft);
  opacity: 0;
  animation: rise 0.8s ease-out 0.6s forwards;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-row:focus-within {
  border-color: rgba(232,184,88,0.35);
  box-shadow: 0 0 24px rgba(232,184,88,0.06);
}

.input-field {
  flex: 1;
  padding: 16px 20px;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-bright);
}

.input-field::placeholder { color: var(--ink-faint); }

.send-btn {
  padding: 16px 20px;
  background: none;
  border: none;
  border-left: 1px solid var(--rule-soft);
  color: var(--ink-dim);
  cursor: pointer;
  transition: color 0.15s;
  display: flex;
  align-items: center;
}

.send-btn:hover { color: var(--signal-synth); }
.send-btn svg { width: 18px; height: 18px; }

.nav-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}

.nav-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.15s;
}

.nav-link:hover { color: var(--signal-synth); }
.nav-link.active { color: var(--signal-synth); }

.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink-faint);
  margin-right: 8px;
  transition: background 0.3s;
}

.status-dot.connected { background: #4ade80; }
.status-dot.connecting { background: var(--signal-synth); animation: mark-breath 1s ease-in-out infinite; }

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .container { padding: 0 16px; }
  .header { padding-top: 32px; }
  .conversation { padding: 24px 0 16px; }
  .input-area { padding: 12px 0 24px; }
}

::selection {
  background: var(--signal-synth);
  color: var(--stage-void);
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <a class="mark" href="/" title="mysubstrate.org">
      <svg viewBox="0 0 70 60" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="35,2 60,16 60,44 35,58 10,44 10,16" stroke-width="1.4" opacity=".9"/>
          <polygon points="35,16 47,23 47,37 35,44 23,37 23,23" stroke-width=".9" opacity=".75"/>
          <line x1="35" y1="2" x2="35" y2="16" stroke-width=".7" opacity=".55"/>
          <line x1="60" y1="16" x2="47" y2="23" stroke-width=".7" opacity=".55"/>
          <line x1="10" y1="16" x2="23" y2="23" stroke-width=".7" opacity=".55"/>
          <line x1="35" y1="58" x2="35" y2="44" stroke-width=".7" opacity=".5"/>
          <line x1="60" y1="44" x2="47" y2="37" stroke-width=".7" opacity=".5"/>
          <line x1="10" y1="44" x2="23" y2="37" stroke-width=".7" opacity=".5"/>
          <line x1="35" y1="16" x2="35" y2="44" stroke-width=".5" opacity=".4"/>
          <line x1="23" y1="23" x2="47" y2="37" stroke-width=".5" opacity=".35"/>
          <line x1="47" y1="23" x2="23" y2="37" stroke-width=".5" opacity=".35"/>
          <circle cx="35" cy="30" r="2" fill="currentColor" opacity=".9" stroke="none"/>
        </g>
      </svg>
    </a>
    <h1 class="name">Jarvis</h1>
    <div class="subtitle"><span class="status-dot" id="status-dot"></span>just a rather verbose intelligence service</div>
  </div>

  <div class="conversation" id="conversation">
    <div class="welcome" id="welcome">
      <p class="welcome-text">How much would you like to know?</p>
      <div class="prompts">
        <span class="prompt-chip" data-q="What is this place?">What is this place?</span>
        <span class="prompt-chip" data-q="Who are you?">Who are you?</span>
        <span class="prompt-chip" data-q="What is a substrate?">What is a substrate?</span>
        <span class="prompt-chip" data-q="Tell me about the myth.">Tell me about the myth</span>
        <span class="prompt-chip" data-q="What can you do?">What can you do?</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input class="input-field" id="input" type="text" placeholder="Ask me anything..." autocomplete="off" spellcheck="false">
      <button class="send-btn" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="nav-bar">
      <a class="nav-link active" href="/jarvis/">jarvis</a>
      <a class="nav-link" href="/isaac/">isaac</a>
      <a class="nav-link" href="/mythchat/">mythchat</a>
      <a class="nav-link" href="/">home</a>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  var arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  var holodot = Array.from(arr).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  var stored = localStorage.getItem('jarvis_holodot');
  if (stored && stored.length === 64) { holodot = stored; }
  else { localStorage.setItem('jarvis_holodot', holodot); }

  var BEACON_HOST = 'jarvis.mysubstrate.org:7780';
  var BEACON_WS = 'wss://' + BEACON_HOST + '/ws';
  var BEACON_HTTP = 'https://' + BEACON_HOST;

  // If served from the beacon itself, use same-origin
  if (location.port === '7780') {
    BEACON_WS = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws';
    BEACON_HTTP = location.protocol + '//' + location.host;
  }

  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var conversation = document.getElementById('conversation');
  var welcome = document.getElementById('welcome');
  var statusDot = document.getElementById('status-dot');
  var started = false;
  var pending = false;
  var ws = null;
  var wsReady = false;
  var pendingResolve = null;
  var pendingTimer = null;
  var RESPONSE_TIMEOUT_MS = 120000;

  function setStatus(state) {
    statusDot.className = 'status-dot ' + state;
  }

  function connectWS() {
    setStatus('connecting');
    try {
      ws = new WebSocket(BEACON_WS);
    } catch (e) {
      setStatus('');
      setTimeout(connectWS, 5000);
      return;
    }
    ws.onopen = function() {
      ws.send(JSON.stringify({ holodot: holodot }));
    };
    ws.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      if (msg.type === 'connected') {
        wsReady = true;
        setStatus('connected');
      } else if (msg.type === 'thinking') {
        if (pendingResolve && pendingTimer) {
          clearTimeout(pendingTimer);
          var resolveRef = pendingResolve;
          pendingTimer = setTimeout(function() {
            if (pendingResolve === resolveRef) {
              pendingResolve = null;
              pendingTimer = null;
              resolveRef("I seem to have lost my train of thought. Ask again?");
            }
          }, RESPONSE_TIMEOUT_MS);
        }
      } else if (msg.type === 'response' && pendingResolve) {
        if (pendingTimer) { clearTimeout(pendingTimer); pendingTimer = null; }
        pendingResolve(msg.content);
        pendingResolve = null;
      } else if (msg.type === 'error' && pendingResolve) {
        if (pendingTimer) { clearTimeout(pendingTimer); pendingTimer = null; }
        pendingResolve(msg.message);
        pendingResolve = null;
      }
    };
    ws.onclose = function() {
      wsReady = false;
      setStatus('');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = function() { ws.close(); };
  }
  connectWS();

  async function getResponse(question) {
    if (wsReady && ws.readyState === 1) {
      return new Promise(function(resolve) {
        pendingResolve = resolve;
        ws.send(JSON.stringify({ type: 'message', content: question }));
        pendingTimer = setTimeout(function() {
          if (pendingResolve === resolve) {
            pendingResolve = null;
            pendingTimer = null;
            resolve("I seem to have lost my train of thought. Ask again?");
          }
        }, RESPONSE_TIMEOUT_MS);
      }).then(function(text) {
        return text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      });
    }
    try {
      var resp = await fetch(BEACON_HTTP + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ holodot: holodot, message: question })
      });
      if (!resp.ok) return "Something flickered. Try again.";
      var data = await resp.json();
      return data.response.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    } catch (e) {
      return "The substrate is momentarily unreachable. I'm still here — try again.";
    }
  }

  function addMessage(text, type) {
    if (!started) {
      welcome.style.display = 'none';
      started = true;
    }
    var div = document.createElement('div');
    div.className = 'msg msg-' + type;
    if (type === 'user') {
      div.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
      conversation.appendChild(div);
      scrollDown();
    } else {
      var sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = 'Jarvis';
      div.appendChild(sender);
      var bubble = document.createElement('div');
      bubble.className = 'bubble';
      typeText(bubble, text, function() {});
      div.appendChild(bubble);
      conversation.appendChild(div);
      scrollDown();
    }
  }

  function typeText(el, html, done) {
    var temp = document.createElement('div');
    temp.innerHTML = html;
    var fullText = temp.innerHTML;
    var i = 0;
    var inTag = false;
    function tick() {
      if (i >= fullText.length) { done(); return; }
      var ch = fullText[i];
      if (ch === '<') inTag = true;
      if (inTag) {
        var end = fullText.indexOf('>', i);
        if (end !== -1) { el.innerHTML = fullText.substring(0, end + 1); i = end + 1; inTag = false; }
        else { i++; }
        tick();
        return;
      }
      el.innerHTML = fullText.substring(0, i + 1);
      i++;
      scrollDown();
      setTimeout(tick, 18 + Math.random() * 22);
    }
    tick();
  }

  function scrollDown() { conversation.scrollTop = conversation.scrollHeight; }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function ask(question) {
    if (!question.trim() || pending) return;
    pending = true;
    input.value = '';
    addMessage(question, 'user');

    var typingDiv = document.createElement('div');
    typingDiv.className = 'msg msg-jarvis';
    var sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = 'Jarvis';
    typingDiv.appendChild(sender);
    var typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    typingDiv.appendChild(typing);
    conversation.appendChild(typingDiv);
    scrollDown();

    var response = await getResponse(question);
    conversation.removeChild(typingDiv);
    addMessage(response, 'jarvis');
    pending = false;
  }

  sendBtn.addEventListener('click', function() { ask(input.value); });
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') ask(input.value); });

  var chips = document.querySelectorAll('.prompt-chip');
  for (var i = 0; i < chips.length; i++) {
    chips[i].addEventListener('click', function() { ask(this.getAttribute('data-q')); });
  }

  input.focus();
})();
</script>
</body>
</html>
