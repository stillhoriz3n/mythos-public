<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020204" id="metaTheme">
<title>Admin — mysubstrate.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
[data-theme="dark"] {
  --signal: #4ec9d4;
  --signal-bright: #6dd8e2;
  --signal-dim: rgba(78,201,212,0.08);
  --signal-glow: rgba(78,201,212,0.25);
  --ink: #e4e2dd;
  --ink-soft: #bbb8b0;
  --ink-dim: #7a776f;
  --ink-faint: #3a3835;
  --bg: #08080c;
  --bg-surface: rgba(255,255,255,0.03);
  --bg-elevated: rgba(255,255,255,0.055);
  --border: rgba(255,255,255,0.07);
  --border-accent: rgba(255,255,255,0.12);
  --glass: rgba(255,255,255,0.04);
  --error: #ff6b6b;
  --user-bubble-bg: rgba(255,255,255,0.03);
  --user-bubble-border: rgba(255,255,255,0.08);
  --code-bg: rgba(0,0,0,0.35);
  --shadow: 0 2px 20px rgba(0,0,0,0.3);
  --matt: #4ec9d4;
  --kevin: #e8b858;
  --isaac: #88aadd;
}

[data-theme="light"] {
  --signal: #2a9aa3;
  --signal-bright: #1d8891;
  --signal-dim: rgba(42,154,163,0.06);
  --signal-glow: rgba(42,154,163,0.18);
  --ink: #1a1a1a;
  --ink-soft: #444;
  --ink-dim: #888;
  --ink-faint: #ccc;
  --bg: #fafaf8;
  --bg-surface: rgba(0,0,0,0.025);
  --bg-elevated: rgba(0,0,0,0.05);
  --border: rgba(0,0,0,0.08);
  --border-accent: rgba(0,0,0,0.14);
  --glass: rgba(0,0,0,0.03);
  --error: #d44;
  --user-bubble-bg: rgba(0,0,0,0.025);
  --user-bubble-border: rgba(0,0,0,0.06);
  --code-bg: rgba(0,0,0,0.04);
  --shadow: 0 2px 20px rgba(0,0,0,0.08);
  --matt: #2a9aa3;
  --kevin: #b8860b;
  --isaac: #3d6ca6;
}

:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

/* ===== RESET ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* ===== APP SHELL ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

/* ===== HEADER ===== */
.header {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  z-index: 10;
}

.mark-icon { width: 26px; height: 26px; flex-shrink: 0; }
.mark-icon svg { width: 100%; height: 100%; color: var(--signal); }

.header-info { flex: 1; min-width: 0; }
.header-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--signal);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.header-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-top: 1px;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.icon-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid var(--border);
  border-radius: 8px; color: var(--ink-dim);
  cursor: pointer; transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn:hover { border-color: var(--border-accent); color: var(--ink-soft); }
.icon-btn svg { width: 16px; height: 16px; }

.status-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 8px; border-radius: 10px;
  background: var(--glass); border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--ink-dim);
}

.status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--ink-faint); transition: all 0.3s;
}
.status-dot.connected { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
.status-dot.connecting { background: var(--signal); animation: pulse 1.4s ease-in-out infinite; }

@keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }

/* ===== CONVERSATION ===== */
.conversation {
  flex: 1 1 auto;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.conversation::-webkit-scrollbar { width: 3px; }
.conversation::-webkit-scrollbar-track { background: transparent; }
.conversation::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

/* ===== MESSAGES ===== */
.msg {
  max-width: 100%;
  animation: msg-in 0.25s ease-out;
}
@keyframes msg-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.msg-system {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  padding: 2px 0;
}

.msg-user { align-self: flex-end; max-width: 82%; }
.msg-user .speaker {
  font-size: 11px; font-weight: 500;
  color: var(--ink-dim);
  margin-bottom: 4px; padding-right: 2px;
  text-align: right;
}
.msg-user .bubble {
  background: var(--user-bubble-bg);
  border: 1px solid var(--user-bubble-border);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 14px; line-height: 1.55;
  color: var(--ink); word-break: break-word;
}

.msg-ai { align-self: flex-start; max-width: 94%; }
.msg-ai .sender {
  font-size: 11px; font-weight: 600;
  margin-bottom: 4px; padding-left: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-family: 'JetBrains Mono', monospace;
}
.msg-ai .bubble {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 16px;
  font-size: 14.5px; line-height: 1.7;
  color: var(--ink-soft); word-break: break-word;
}

/* Markdown inside AI bubbles */
.msg-ai .bubble p { margin-bottom: 8px; }
.msg-ai .bubble p:last-child { margin-bottom: 0; }
.msg-ai .bubble em { font-style: italic; }
.msg-ai .bubble strong { color: var(--ink); font-weight: 600; }
.msg-ai .bubble code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; background: var(--code-bg);
  padding: 1px 5px; border-radius: 4px; color: var(--signal-bright);
}
.msg-ai .bubble pre {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; margin: 8px 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.msg-ai .bubble pre code {
  background: none; padding: 0; font-size: 12px;
  line-height: 1.5; color: var(--ink-soft);
}
.msg-ai .bubble blockquote {
  border-left: 2px solid var(--signal); padding-left: 12px;
  margin: 8px 0; color: var(--ink-dim); font-style: italic;
}
.msg-ai .bubble ul, .msg-ai .bubble ol { padding-left: 18px; margin: 6px 0; }
.msg-ai .bubble li { margin: 3px 0; line-height: 1.55; }
.msg-ai .bubble a { color: var(--signal); text-decoration: underline; text-underline-offset: 2px; }
.msg-ai .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* Typing dots */
.typing-indicator { align-self: flex-start; }
.typing-indicator .typing-label {
  font-size: 11px; font-weight: 600;
  margin-bottom: 4px; padding-left: 2px;
  text-transform: uppercase; letter-spacing: 0.05em;
  font-family: 'JetBrains Mono', monospace;
}
.typing-indicator .typing-dots {
  display: inline-flex; gap: 5px; align-items: center;
  padding: 12px 16px; background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
}
.typing-indicator .typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--signal); opacity: 0.3;
  animation: bounce-dot 1.4s ease-in-out infinite;
}
.typing-indicator .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce-dot {
  0%,60%,100% { opacity:.3; transform: translateY(0); }
  30% { opacity:1; transform: translateY(-3px); }
}

/* Message actions */
.msg-actions {
  display: flex; gap: 4px; margin-top: 4px;
  opacity: 0; transition: opacity 0.15s;
}
.msg:hover .msg-actions { opacity: 1; }
@media (hover: none) { .msg-actions { opacity: 0.5; } }

.action-btn {
  padding: 3px 7px; background: none;
  border: 1px solid var(--border); border-radius: 5px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--ink-faint); cursor: pointer; transition: all 0.12s;
}
.action-btn:active { border-color: var(--signal-glow); color: var(--signal); }

/* ===== INPUT AREA ===== */
.input-area {
  flex: 0 0 auto;
  padding: 10px 14px;
  padding-bottom: calc(10px + var(--safe-bottom));
  border-top: 1px solid var(--border);
  background: var(--bg);
  z-index: 10;
}

.input-row {
  display: flex; align-items: flex-end; gap: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 640px; margin: 0 auto;
}
.input-row:focus-within {
  border-color: var(--signal-glow);
  box-shadow: 0 0 16px rgba(78,201,212,0.04);
}

#input {
  flex: 1; padding: 12px 14px;
  background: transparent; border: none; outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 400; color: var(--ink);
  resize: none; min-height: 44px; max-height: 120px;
  line-height: 1.45; overflow-y: auto;
}
#input::placeholder { color: var(--ink-faint); }

.send-btn {
  padding: 10px 12px; background: none; border: none;
  border-left: 1px solid var(--border);
  color: var(--ink-faint); cursor: pointer;
  transition: color 0.12s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
  min-width: 44px; min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
.send-btn.active { color: var(--signal); }
.send-btn:active { transform: scale(0.9); }
.send-btn:disabled { opacity: 0.25; pointer-events: none; }
.send-btn svg { width: 18px; height: 18px; }

.nav-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}

.nav-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.15s;
}
.nav-link:hover { color: var(--signal); }
.nav-link.active { color: var(--signal); }

/* ===== NAME OVERLAY ===== */
.name-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 100;
  animation: fade-in 0.6s ease-out;
}

.name-overlay.hidden { display: none; }

.name-overlay h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--signal);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.name-overlay p {
  font-size: 14px;
  font-weight: 400;
  color: var(--ink-dim);
  max-width: 340px;
  text-align: center;
  line-height: 1.6;
}

.name-overlay .net-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 6px;
  text-transform: uppercase;
}

.name-input {
  padding: 12px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  outline: none;
  width: 240px;
  text-align: center;
  transition: border-color 0.2s;
}

.name-input:focus { border-color: var(--signal-glow); }

.name-enter {
  padding: 12px 28px;
  background: transparent;
  border: 1px solid var(--signal-glow);
  border-radius: 8px;
  color: var(--signal);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.name-enter:hover {
  background: var(--signal-dim);
  border-color: var(--signal);
}

/* ===== ERROR TOAST ===== */
.error-toast {
  position: fixed; top: calc(var(--safe-top) + 56px);
  left: 50%; transform: translateX(-50%) translateY(-12px);
  background: var(--bg-elevated); border: 1px solid rgba(255,107,107,0.3);
  border-radius: 10px; padding: 8px 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--error);
  opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 200;
}
.error-toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

/* ===== SCROLL ANCHOR ===== */
.scroll-anchor { height: 1px; flex-shrink: 0; }

@keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

::selection { background: var(--signal); color: var(--bg); }

/* ===== DESKTOP ===== */
@media (min-width: 640px) {
  .conversation { padding: 24px 20px; max-width: 680px; margin: 0 auto; width: 100%; }
  .header { padding: 14px 20px; }
}
</style>
</head>
<body>

  <svg viewBox="0 0 70 60" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px;color:var(--signal);filter:drop-shadow(0 0 16px rgba(78,201,212,0.25))">

<script>
(function() {
  'use strict';

  var CHAR_COLORS = { MATT: '#4ec9d4', KEVIN: '#e8b858', ISAAC: '#88aadd' };

  // ===== HOLODOT =====
  function generateHolodot() {
    var stored = localStorage.getItem('admin_holodot');
    if (stored && stored.length === 64) return stored;
    var bytes = new Uint8Array(32);
    crypto.getRandomValues(bytes);
    var hex = Array.from(bytes).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    localStorage.setItem('admin_holodot', hex);
    return hex;
  }

  var holodot = generateHolodot();
  var myName = localStorage.getItem('admin_name') || '';
  var ws = null;
  var wsReady = false;

  var BEACON_HOST = 'jarvis.mysubstrate.org:7780';
  var WS_URL;
  if (location.port === '7780') {
    WS_URL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws/admin';
  } else {
    WS_URL = 'wss://' + BEACON_HOST + '/ws/admin';
  }

  // ===== ELEMENTS =====
  var overlay = document.getElementById('name-overlay');
  var nameInput = document.getElementById('name-input');
  var nameEnter = document.getElementById('name-enter');
  var conversation = document.getElementById('conversation');
  var scrollAnchor = document.getElementById('scrollAnchor');
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');
  var statusDot = document.getElementById('statusDot');
  var statusLabel = document.getElementById('statusLabel');
  var errorToast = document.getElementById('errorToast');

  // ===== THEME =====
  var theme = localStorage.getItem('plm_theme') || 'dark';

  function setTheme(t) {
    theme = t;
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('plm_theme', t);
    document.getElementById('metaTheme').content = t === 'dark' ? '#020204' : '#fafaf8';
    document.getElementById('themeIcon').innerHTML = t === 'dark'
      ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
      : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
  setTheme(theme);

  document.getElementById('themeBtn').addEventListener('click', function() {
    setTheme(theme === 'dark' ? 'light' : 'dark');
  });

  // ===== STATUS =====
  function setStatus(s) {
    statusDot.className = 'status-dot ' + s;
    statusLabel.textContent = s === 'connected' ? 'live' : s === 'connecting' ? '...' : 'offline';
  }

  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.classList.add('visible');
    setTimeout(function() { errorToast.classList.remove('visible'); }, 4000);
  }

  // ===== TEXTAREA RESIZE =====
  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    var hasText = input.value.trim().length > 0;
    sendBtn.disabled = !hasText;
    sendBtn.classList.toggle('active', hasText);
  }
  input.addEventListener('input', autoResize);

  // ===== iOS FIX =====
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      if (document.activeElement === input) requestAnimationFrame(scrollDown);
    });
  }

  document.addEventListener('touchmove', function(e) {
    if (!conversation.contains(e.target)) e.preventDefault();
  }, { passive: false });

  // ===== NAME OVERLAY =====
  if (myName) {
    overlay.classList.add('hidden');
    connectWS();
    input.focus();
  } else {
    nameInput.focus();
  }

  function enterAdmin(name) {
    myName = name || 'Fleet';
    localStorage.setItem('admin_name', myName);
    overlay.classList.add('hidden');
    connectWS();
    input.focus();
  }

  nameEnter.addEventListener('click', function() { enterAdmin(nameInput.value.trim()); });
  nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') enterAdmin(nameInput.value.trim()); });

  // ===== SCROLL =====
  function scrollDown() {
    requestAnimationFrame(function() {
      scrollAnchor.scrollIntoView({ block: 'end', behavior: 'smooth' });
    });
  }

  // ===== MARKDOWN =====
  function md(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, function(_,l,c) { return '<pre><code>' + esc(c.trim()) + '</code></pre>'; })
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/^---$/gm, '<hr>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/^[*-] (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g, function(m) { return '<ul>' + m + '</ul>'; })
      .replace(/^(?!<[hpuloblir])((?!<).+)$/gm, '<p>$1</p>');
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== WEBSOCKET =====
  function connectWS() {
    setStatus('connecting');
    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      setStatus('');
      setTimeout(connectWS, 5000);
      return;
    }

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: 'handshake', holodot: holodot, name: myName }));
    };

    ws.onmessage = function(e) {
      var msg;
      try { msg = JSON.parse(e.data); } catch (_) { return; }
      handleMessage(msg);
    };

    ws.onclose = function() {
      wsReady = false;
      setStatus('');
      setTimeout(connectWS, 3000);
    };

    ws.onerror = function() { ws.close(); };
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'connected':
        wsReady = true;
        setStatus('connected');
        myName = msg.name || myName;
        if (msg.colors) Object.assign(CHAR_COLORS, msg.colors);
        if (msg.history) {
          msg.history.forEach(function(entry) {
            if (entry.type === 'system') addSystemMsg(entry.content);
            else if (entry.type === 'human') addHumanMsg(entry.speaker || entry.name, entry.content);
            else if (entry.type === 'character') addCharMsg(entry.speaker || entry.character, entry.content);
          });
        }
        break;
      case 'human':
        addHumanMsg(msg.name, msg.content);
        break;
      case 'character':
        hideThinking();
        addCharMsg(msg.character, msg.content);
        break;
      case 'thinking':
        showThinking(msg.character || null);
        break;
      case 'join':
        addSystemMsg(msg.name + ' connected');
        break;
      case 'leave':
        addSystemMsg(msg.name + ' disconnected');
        break;
      case 'error':
        hideThinking();
        showError(msg.message || 'Error');
        break;
      case 'pong':
        break;
    }
  }

  function showThinking(charName) {
    hideThinking();
    var div = document.createElement('div');
    div.className = 'msg typing-indicator';
    div.id = 'thinking-msg';
    var label = document.createElement('div');
    label.className = 'typing-label';
    var c = charName ? (CHAR_COLORS[charName] || '#7a776f') : 'var(--ink-dim)';
    label.textContent = (charName || 'thinking') + '...';
    label.style.color = c;
    div.appendChild(label);
    var dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    if (charName && CHAR_COLORS[charName]) {
      dots.querySelectorAll('span').forEach(function(s) { s.style.background = CHAR_COLORS[charName]; });
    }
    div.appendChild(dots);
    scrollAnchor.before(div);
    scrollDown();
  }

  function hideThinking() {
    var el = document.getElementById('thinking-msg');
    if (el) el.remove();
  }

  function addSystemMsg(text) {
    var div = document.createElement('div');
    div.className = 'msg msg-system';
    div.textContent = text;
    scrollAnchor.before(div);
    scrollDown();
  }

  function addHumanMsg(name, text) {
    var div = document.createElement('div');
    div.className = 'msg msg-user';
    var speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = name;
    div.appendChild(speaker);
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    scrollAnchor.before(div);
    scrollDown();
  }

  function addCharMsg(charName, text) {
    var div = document.createElement('div');
    div.className = 'msg msg-ai';
    var sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = charName;
    var c = CHAR_COLORS[charName] || '#bbb8b0';
    sender.style.color = c;
    div.appendChild(sender);
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.borderColor = c.replace('#', 'rgba(') ? 'rgba(' + parseInt(c.slice(1,3),16) + ',' + parseInt(c.slice(3,5),16) + ',' + parseInt(c.slice(5,7),16) + ',0.15)' : 'var(--border)';
    bubble.innerHTML = md(text);
    div.appendChild(bubble);
    var actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = '<button class="action-btn" data-copy="' + esc(text) + '">copy</button>';
    div.appendChild(actions);
    scrollAnchor.before(div);
    scrollDown();
  }

  // ===== COPY HANDLER =====
  document.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-copy]');
    if (!btn) return;
    navigator.clipboard.writeText(btn.dataset.copy).then(function() {
      btn.textContent = 'copied';
      setTimeout(function() { btn.textContent = 'copy'; }, 1500);
    });
  });

  // ===== SEND =====
  function send() {
    var text = input.value.trim();
    if (!text || !wsReady) return;
    input.value = '';
    autoResize();
    ws.send(JSON.stringify({ type: 'message', content: text }));
    addHumanMsg(myName, text);
    if ('ontouchstart' in window) input.blur();
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  if (window.matchMedia('(hover: hover)').matches && myName) input.focus();
})();
</script>
</body>
</html>
