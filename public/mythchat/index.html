<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020204">
<title>MythChat — mysubstrate.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --signal-synth: #e8b858;
  --signal-synth-bright: #f5c970;
  --signal-synth-dim: rgba(232,184,88,0.12);
  --ink-bright: #e8e3d4;
  --ink-soft: #b5b0a3;
  --ink-dim: #8a8574;
  --ink-faint: #4a4740;
  --stage-void: #020204;
  --rule-soft: #1b2028;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #020204 !important; }
body {
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--stage-void);
  color: var(--ink-bright);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.container {
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 780px;
  margin: 0 auto;
  padding: 0 24px;
}

.header {
  padding: 24px 0 0;
  text-align: center;
  flex-shrink: 0;
  opacity: 0;
  animation: rise 0.8s ease-out 0.1s forwards;
}

.header-title {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 96;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--signal-synth);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.header-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

.members-bar {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-dim);
  margin-top: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--rule-soft);
  max-height: 42px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.members-bar .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #4ade80;
  margin-right: 3px;
  vertical-align: middle;
}

.members-bar .char-dot { background: var(--signal-synth); }

.conversation {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--ink-faint) transparent;
}

.conversation::-webkit-scrollbar { width: 4px; }
.conversation::-webkit-scrollbar-track { background: transparent; }
.conversation::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 2px; }

.msg { opacity: 0; animation: rise 0.3s ease-out forwards; }

.msg-system {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
  padding: 4px 0;
}

.msg-human { text-align: right; }

.msg-human .speaker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-dim);
  margin-bottom: 3px;
  padding-right: 4px;
}

.msg-human .bubble {
  display: inline-block;
  background: rgba(232,184,88,0.06);
  border: 1px solid rgba(232,184,88,0.15);
  border-radius: 14px 14px 4px 14px;
  padding: 10px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-bright);
  max-width: 75%;
  text-align: left;
  word-break: break-word;
}

.msg-character { text-align: left; }

.msg-character .speaker {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 11px;
  margin-bottom: 3px;
  padding-left: 2px;
}

.msg-character .bubble {
  display: inline-block;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--rule-soft);
  border-radius: 4px 14px 14px 14px;
  padding: 10px 16px;
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "opsz" 24;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-soft);
  max-width: 80%;
  word-break: break-word;
}

.msg-character .bubble em { font-style: italic; }

.typing-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  opacity: 0;
  transition: opacity 0.3s;
}

.typing-row.visible { opacity: 1; }

.typing-row .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
}

.typing-dots {
  display: inline-flex;
  gap: 3px;
}

.typing-dots span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--signal-synth);
  opacity: 0.4;
  animation: dot-pulse 1.4s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dot-pulse {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

.input-area {
  flex-shrink: 0;
  padding: 12px 0 20px;
  border-top: 1px solid var(--rule-soft);
  opacity: 0;
  animation: rise 0.8s ease-out 0.6s forwards;
}

.input-row {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-row:focus-within {
  border-color: rgba(232,184,88,0.35);
  box-shadow: 0 0 24px rgba(232,184,88,0.06);
}

.input-field {
  flex: 1;
  padding: 14px 18px;
  background: transparent;
  border: none;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--ink-bright);
}

.input-field::placeholder { color: var(--ink-faint); }

.send-btn {
  padding: 14px 18px;
  background: none;
  border: none;
  border-left: 1px solid var(--rule-soft);
  color: var(--ink-dim);
  cursor: pointer;
  transition: color 0.15s;
  display: flex;
  align-items: center;
}

.send-btn:hover { color: var(--signal-synth); }
.send-btn svg { width: 18px; height: 18px; }

.nav-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 10px;
}

.nav-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-decoration: none;
  transition: color 0.15s;
}

.nav-link:hover { color: var(--signal-synth); }
.nav-link.active { color: var(--signal-synth); }

.name-overlay {
  position: fixed;
  inset: 0;
  background: var(--stage-void);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
  opacity: 0;
  animation: rise 0.6s ease-out forwards;
}

.name-overlay.hidden { display: none; }

.name-overlay h2 {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 1.6rem;
  color: var(--signal-synth);
}

.name-overlay p {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 14px;
  color: var(--ink-dim);
  max-width: 360px;
  text-align: center;
  line-height: 1.5;
}

.name-overlay .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.15em;
}

.name-input {
  padding: 14px 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
  color: var(--ink-bright);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  outline: none;
  width: 260px;
  text-align: center;
  transition: border-color 0.2s;
}

.name-input:focus { border-color: rgba(232,184,88,0.4); }

.name-enter {
  padding: 12px 28px;
  background: transparent;
  border: 1px solid rgba(232,184,88,0.3);
  border-radius: 6px;
  color: var(--signal-synth);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.name-enter:hover {
  background: var(--signal-synth-dim);
  border-color: var(--signal-synth);
}

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .container { padding: 0 14px; }
  .header { padding-top: 16px; }
  .msg-human .bubble, .msg-character .bubble { max-width: 90%; }
}

::selection {
  background: var(--signal-synth);
  color: var(--stage-void);
}
</style>
</head>
<body>

<div class="name-overlay" id="name-overlay">
  <h2>MythChat</h2>
  <p>56 characters. One living room. Drop in.</p>
  <span class="count">CHARACTERS ARE ALWAYS HERE</span>
  <input class="name-input" id="name-input" type="text" placeholder="Your name" autocomplete="off" spellcheck="false">
  <button class="name-enter" id="name-enter">Enter</button>
</div>

<div class="container">

  <div class="header">
    <h1 class="header-title">MythChat</h1>
    <div class="header-sub">56 characters. one living room. drop in.</div>
    <div class="members-bar" id="members-bar"></div>
  </div>

  <div class="conversation" id="conversation">
    <div class="typing-row" id="typing-row">
      <span class="label" id="typing-label">someone is typing</span>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input class="input-field" id="input" type="text" placeholder="Say something..." autocomplete="off" spellcheck="false">
      <button class="send-btn" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="nav-bar">
      <a class="nav-link" href="/jarvis/">jarvis</a>
      <a class="nav-link" href="/isaac/">isaac</a>
      <a class="nav-link active" href="/mythchat/">mythchat</a>
      <a class="nav-link" href="/">home</a>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  function generateHolodot() {
    var stored = localStorage.getItem('mythchat_holodot');
    if (stored && stored.length === 64) return stored;
    var bytes = new Uint8Array(32);
    crypto.getRandomValues(bytes);
    var hex = Array.from(bytes).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    localStorage.setItem('mythchat_holodot', hex);
    return hex;
  }

  var holodot = generateHolodot();
  var charColors = {};
  var myName = localStorage.getItem('mythchat_name') || '';
  var ws = null;
  var wsReady = false;

  var BEACON_HOST = 'jarvis.mysubstrate.org';
  var WS_URL;
  if (location.hostname === BEACON_HOST || location.port === '7780') {
    WS_URL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws/mythchat';
  } else {
    WS_URL = 'wss://' + BEACON_HOST + '/ws/mythchat';
  }

  var overlay = document.getElementById('name-overlay');
  var nameInput = document.getElementById('name-input');
  var nameEnter = document.getElementById('name-enter');
  var conversation = document.getElementById('conversation');
  var typingRow = document.getElementById('typing-row');
  var typingLabel = document.getElementById('typing-label');
  var membersBar = document.getElementById('members-bar');
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');

  if (myName) {
    overlay.classList.add('hidden');
    nameInput.value = myName;
    connectWS();
    input.focus();
  } else {
    nameInput.focus();
  }

  function enterChat(name) {
    myName = name || 'Wanderer';
    localStorage.setItem('mythchat_name', myName);
    overlay.classList.add('hidden');
    connectWS();
    input.focus();
  }

  nameEnter.addEventListener('click', function() { enterChat(nameInput.value.trim()); });
  nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') enterChat(nameInput.value.trim()); });

  function connectWS() {
    try {
      ws = new WebSocket(WS_URL);
    } catch (e) {
      setTimeout(connectWS, 5000);
      return;
    }

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: 'handshake', holodot: holodot, name: myName }));
    };

    ws.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      handleMessage(msg);
    };

    ws.onclose = function() {
      wsReady = false;
      setTimeout(connectWS, 3000);
    };

    ws.onerror = function() { ws.close(); };
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'connected':
        wsReady = true;
        myName = msg.name || myName;
        charColors = msg.colors || {};
        updateMembers(msg.members || []);
        if (msg.history) {
          msg.history.forEach(function(entry) {
            if (entry.type === 'system') addSystemMsg(entry.content);
            else if (entry.type === 'human') addHumanMsg(entry.speaker || entry.name, entry.content);
            else if (entry.type === 'character') addCharMsg(entry.speaker || entry.character, entry.content, entry.color);
          });
        }
        break;
      case 'human':
        addHumanMsg(msg.name, msg.content);
        break;
      case 'character':
        hideThinking();
        addCharMsg(msg.character, msg.content, msg.color);
        break;
      case 'join':
        addSystemMsg(msg.name + ' dropped in.');
        updateMembers(msg.members || []);
        break;
      case 'leave':
        addSystemMsg(msg.name + ' left.');
        updateMembers(msg.members || []);
        break;
      case 'thinking':
        showThinking(msg.character || null);
        break;
      case 'pong':
        break;
    }
  }

  function updateMembers(list) {
    if (!list.length) { membersBar.innerHTML = ''; return; }
    membersBar.innerHTML = list.map(function(n) {
      var isChar = charColors[n];
      var dotClass = isChar ? 'dot char-dot' : 'dot';
      return '<span class="' + dotClass + '"></span>' + escapeHtml(n);
    }).join(' &nbsp;&middot;&nbsp; ');
  }

  function showThinking(charName) {
    typingLabel.textContent = charName ? charName + ' is thinking' : 'someone is typing';
    typingRow.classList.add('visible');
    scrollDown();
  }

  function hideThinking() { typingRow.classList.remove('visible'); }

  function addSystemMsg(text) {
    var div = document.createElement('div');
    div.className = 'msg msg-system';
    div.textContent = text;
    conversation.insertBefore(div, typingRow);
    scrollDown();
  }

  function addHumanMsg(name, text) {
    var div = document.createElement('div');
    div.className = 'msg msg-human';
    var speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = name;
    div.appendChild(speaker);
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    conversation.insertBefore(div, typingRow);
    scrollDown();
  }

  function addCharMsg(charName, text, color) {
    var div = document.createElement('div');
    div.className = 'msg msg-character';
    var speaker = document.createElement('div');
    speaker.className = 'speaker';
    speaker.textContent = charName;
    var c = color || charColors[charName] || '#b5b0a3';
    speaker.style.color = c;
    div.appendChild(speaker);
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (c.startsWith('#')) {
      var r = parseInt(c.slice(1,3),16);
      var g = parseInt(c.slice(3,5),16);
      var b2 = parseInt(c.slice(5,7),16);
      bubble.style.borderColor = 'rgba(' + r + ',' + g + ',' + b2 + ',0.15)';
    }
    bubble.innerHTML = text.replace(/\*([^*]+)\*/g, '<em style="color:' + c + '">$1</em>');
    div.appendChild(bubble);
    conversation.insertBefore(div, typingRow);
    scrollDown();
  }

  function scrollDown() { conversation.scrollTop = conversation.scrollHeight; }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function send() {
    var text = input.value.trim();
    if (!text || !wsReady) return;
    input.value = '';
    ws.send(JSON.stringify({ type: 'message', content: text }));
    addHumanMsg(myName, text);
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') send(); });
})();
</script>
</body>
</html>
